<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Manage Â· TSH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1a1f2e" />
  <link rel="icon" href="./assets/images/TaLogo.png" type="image/png" />
  <script>(function(){try{var t=localStorage.getItem('tsh_theme');if(t!=='dark'&&t!=='light'&&t!=='medium')t='light';if(t!=='dark')document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./assets/css/theme.css?v=14" />
</head>
<body class="tsh-page">
  <div data-include="header"></div>
  <div data-include="toast"></div>
  <div data-include="modal"></div>

  <main class="tsh-main tsh-main-wide">
    <section class="tsh-card">
      <header class="tsh-card-head tsh-card-head-row">
        <div>
          <h1 id="dashTitle"><i class="fas fa-user-shield gold-accent"></i> Manage</h1>
          <p class="tsh-sub" id="dashRoleHint">Review and assign daily issues.</p>
        </div>
        <div class="tsh-toolbar">
          <select id="filterTower" aria-label="Filter by tower"><option value="">All towers</option></select>
          <select id="filterCategory" aria-label="Filter by category"><option value="">All categories</option></select>
          <select id="filterSeverity" aria-label="Filter by severity">
            <option value="">All severities</option>
            <option value="critical">Critical</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
          <button type="button" class="tsh-btn tsh-btn-ghost" id="refreshBtn"><i class="fas fa-sync-alt"></i>Refresh</button>
          <button type="button" class="tsh-btn tsh-btn-ghost" id="bulkArchiveBtn" hidden><i class="fas fa-box-archive"></i>Archive old tickets…</button>
          <button type="button" class="tsh-btn tsh-btn-ghost" id="auditBtn" hidden><i class="fas fa-clipboard-list"></i>Activity log</button>
        </div>
      </header>

      <nav class="tsh-tabs" role="tablist" aria-label="Status">
        <button type="button" role="tab" aria-selected="true"  data-status="new"         class="tsh-tab tsh-tab-active">New</button>
        <button type="button" role="tab" aria-selected="false" data-status="triaging"    class="tsh-tab">Reviewing</button>
        <button type="button" role="tab" aria-selected="false" data-status="assigned"    class="tsh-tab">Assigned</button>
        <button type="button" role="tab" aria-selected="false" data-status="in_progress" class="tsh-tab">In progress</button>
        <button type="button" role="tab" aria-selected="false" data-status="resolved"    class="tsh-tab">Resolved</button>
        <button type="button" role="tab" aria-selected="false" data-status="rejected"    class="tsh-tab">Rejected</button>
        <button type="button" role="tab" aria-selected="false" data-status=""            class="tsh-tab">All</button>
      </nav>

      <div class="tsh-table-wrap">
        <table class="tsh-table" id="issuesTable" aria-live="polite">
          <thead>
            <tr>
              <th scope="col">ID</th>
              <th scope="col">Tower</th>
              <th scope="col">Category</th>
              <th scope="col">Severity</th>
              <th scope="col">Status</th>
              <th scope="col">Age</th>
              <th scope="col" class="tsh-actions-col">Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div id="dashEmpty" class="tsh-state tsh-state-empty" hidden>
        <i class="tsh-state-icon fas fa-inbox"></i>
        <p class="tsh-state-title">No issues match this filter</p>
        <p class="tsh-state-msg">Adjust the tower / category / severity filters above.</p>
      </div>
    </section>
  </main>

  <div data-include="footer"></div>

  <script src="./assets/js/config.js?v=11"></script>
  <script src="./assets/js/partials.js?v=14"></script>
  <script src="./assets/js/api.js?v=11"></script>
  <script src="./assets/js/auth.js?v=11"></script>
  <script src="./assets/js/flags.js?v=11"></script>
  <script src="./assets/js/ui.js?v=15"></script>
  <script src="./assets/js/dashboard.js?v=15"></script>
  <script>
  (async () => {
    await Partials.mount();
    await Auth.init({ clientId: window.TSH_GOOGLE_CLIENT_ID });
    UI.bindHeader();

    let who;
    try {
      who = await Flags.ensureAuthorized('MANAGER');
      Flags.ensureFeature('FEATURE_DAILY_MANAGER_DASHBOARD', 'Manage');
    } catch (_e) { return; }

    const isCommittee = Flags.isAtLeast(who.primary, 'COMMITTEE');

    // Header reflects effective role so the page communicates capability,
    // not page identity. Committee gets the elevated label + delete/archive/audit;
    // manager gets the basic surface. Worker RBAC remains authoritative.
    const title = document.getElementById('dashTitle');
    const hint  = document.getElementById('dashRoleHint');
    if (isCommittee) {
      title.innerHTML = '<i class="fas fa-people-group gold-accent"></i> Manage (Committee)';
      hint.textContent = 'Review, assign, resolve — plus delete, archive old tickets, and activity log.';
    }

    Dashboard.boot({ role: who.primary, allowDelete: isCommittee });

    if (isCommittee) {
      const bulkBtn  = document.getElementById('bulkArchiveBtn');
      const auditBtn = document.getElementById('auditBtn');
      bulkBtn.hidden = false;
      bulkBtn.addEventListener('click', async () => {
        const ok = await UI.confirmModal('Archive old resolved/rejected tickets',
          'Removes every resolved or rejected ticket older than the configured cutoff. The action is recorded in the activity log. Continue?');
        if (!ok) return;
        try {
          const res = await Api.post('/issues/bulk-archive', { confirm: true });
          UI.toast(`Archived ${res.archived || 0} ticket(s).`, { kind: 'success' });
          Dashboard.reload();
        } catch (e) { UI.toast(e.message || 'Archive failed.', { kind: 'danger' }); }
      });

      if (Flags.on('FEATURE_DAILY_AUDIT_LOG_UI')) {
        auditBtn.hidden = false;
        auditBtn.addEventListener('click', async () => {
          try {
            const entries = await Api.get('/audit?limit=200');
            const body = document.createElement('div');
            body.className = 'tsh-audit-list';
            for (const e of entries) {
              const row = UI.el('div', { class: 'tsh-audit-row' },
                UI.el('span', { class: 'tsh-mono tsh-text-muted' }, new Date(e.at).toLocaleString()),
                UI.el('span', { class: 'tsh-mono' }, e.actor),
                UI.el('span', null, e.action),
                UI.el('span', { class: 'tsh-text-muted' }, e.target || ''),
                UI.el('span', { class: 'tsh-text-faint' }, e.detail || ''));
              body.appendChild(row);
            }
            UI.modal({ title: 'Activity log (most recent first)', body, actions: [{ label: 'Close', value: true }] });
          } catch (e) { UI.toast(e.message || 'Activity log unavailable.', { kind: 'danger' }); }
        });
      }
    }
  })();
  </script>
</body>
</html>

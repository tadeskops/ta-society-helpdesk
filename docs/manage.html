<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Manage · TSH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1a1f2e" />
  <link rel="icon" href="./assets/images/TaLogo.png" type="image/png" />
  <script>(function(){try{var t=localStorage.getItem('tsh_theme');if(t!=='dark'&&t!=='light'&&t!=='medium')t='light';if(t!=='dark')document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./assets/css/theme.css?v=44" />
</head>
<body class="tsh-page">
  <div data-include="header"></div>
  <div data-include="toast"></div>
  <div data-include="modal"></div>

  <main class="tsh-main tsh-main-wide">
    <section class="tsh-card">
      <header class="tsh-card-head tsh-card-head-row">
        <div>
          <h1 id="dashTitle"><i class="fas fa-user-shield gold-accent"></i> Manage</h1>
          <p class="tsh-sub" id="dashRoleHint">Review and assign daily issues.</p>
        </div>
        <div class="tsh-toolbar">
          <select id="filterTower" aria-label="Filter by tower"><option value="">All towers</option></select>
          <select id="filterCategory" aria-label="Filter by category"><option value="">All categories</option></select>
          <select id="filterSeverity" aria-label="Filter by severity">
            <option value="">All severities</option>
            <option value="critical">Critical</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
          <button type="button" class="tsh-btn tsh-btn-primary" id="applyFiltersBtn"><i class="fas fa-filter"></i>Go</button>
          <button type="button" class="tsh-btn tsh-btn-ghost" id="refreshBtn"><i class="fas fa-sync-alt"></i>Refresh</button>
          <button type="button" class="tsh-btn tsh-btn-ghost" id="bulkArchiveBtn" hidden><i class="fas fa-box-archive"></i>Archive old tickets…</button>
          <button type="button" class="tsh-btn tsh-btn-ghost" id="auditBtn" hidden><i class="fas fa-clipboard-list"></i>Activity log</button>
        </div>
      </header>

      <nav class="tsh-tabs" role="tablist" aria-label="Status">
        <button type="button" role="tab" aria-selected="true"  data-status="new"         class="tsh-tab tsh-tab-active">New</button>
        <button type="button" role="tab" aria-selected="false" data-status="triaging"    class="tsh-tab">Reviewing</button>
        <button type="button" role="tab" aria-selected="false" data-status="assigned"    class="tsh-tab">Assigned</button>
        <button type="button" role="tab" aria-selected="false" data-status="in_progress" class="tsh-tab">In progress</button>
        <button type="button" role="tab" aria-selected="false" data-status="resolved"    class="tsh-tab">Resolved</button>
        <button type="button" role="tab" aria-selected="false" data-status="rejected"    class="tsh-tab">Rejected</button>
        <button type="button" role="tab" aria-selected="false" data-status=""            class="tsh-tab">All</button>
      </nav>

      <div class="tsh-table-wrap">
        <table class="tsh-table" id="issuesTable" aria-live="polite">
          <thead>
            <tr>
              <th scope="col" data-tsh-tip="id">ID</th>
              <th scope="col" data-tsh-tip="tower">Tower</th>
              <th scope="col" data-tsh-tip="category">Category</th>
              <th scope="col" data-tsh-tip="severity">Severity</th>
              <th scope="col" data-tsh-tip="status">Status</th>
              <th scope="col" data-tsh-tip="age">Age</th>
              <th scope="col" class="tsh-actions-col" data-tsh-tip="actions">Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div id="dashEmpty" class="tsh-state tsh-state-empty" hidden>
        <i class="tsh-state-icon fas fa-inbox"></i>
        <p class="tsh-state-title">No issues match this filter</p>
        <p class="tsh-state-msg">Adjust the tower / category / severity filters above.</p>
      </div>
    </section>

    <section class="tsh-card" id="bannerEditorCard" data-tsh-flag="FEATURE_DAILY_BANNER" hidden>
      <div id="bannerEditor"></div>
    </section>

    <section class="tsh-card" id="annEditorCard" data-tsh-flag="FEATURE_DAILY_ANNOUNCEMENTS" hidden>
      <div id="annEditor"></div>
    </section>

    <section class="tsh-card" id="eventsEditorCard" data-tsh-flag="FEATURE_DAILY_EVENTS" hidden>
      <div id="eventsEditor"></div>
    </section>

    <section class="tsh-card" id="pollsEditorCard" data-tsh-flag="FEATURE_DAILY_POLLS" hidden>
      <div id="pollsEditor"></div>
      <div id="pollsVoters" style="margin-top: var(--space-4);"></div>
    </section>
  </main>

  <div data-include="footer"></div>

  <script src="./assets/js/config.js?v=11"></script>
  <script src="./assets/js/partials.js?v=17"></script>
  <script src="./assets/js/api.js?v=11"></script>
  <script src="./assets/js/auth.js?v=11"></script>
  <script src="./assets/js/flags.js?v=12"></script>
  <script src="./assets/js/ui.js?v=33"></script>
  <script src="./assets/js/visitors.js?v=2"></script>
  <script src="./assets/js/banner.js?v=1"></script>
  <script src="./assets/js/announcements.js?v=3"></script>
  <script src="./assets/js/events.js?v=1"></script>
  <script src="./assets/js/polls.js?v=1"></script>
  <script src="./assets/js/dashboard.js?v=16"></script>
  <script>
  (async () => {
    await Partials.mount();
    await Auth.init({ clientId: window.TSH_GOOGLE_CLIENT_ID });
    UI.bindHeader();

    let who;
    try {
      who = await Flags.ensureAuthorized('MANAGER');
      Flags.ensureFeature('FEATURE_DAILY_MANAGER_DASHBOARD', 'Manage');
    } catch (_e) { return; }

    const isCommittee = Flags.isAtLeast(who.primary, 'COMMITTEE');

    // Header reflects effective role so the page communicates capability,
    // not page identity. Committee gets the elevated label + delete/archive/audit;
    // manager gets the basic surface. Worker RBAC remains authoritative.
    const title = document.getElementById('dashTitle');
    const hint  = document.getElementById('dashRoleHint');
    if (isCommittee) {
      title.innerHTML = '<i class="fas fa-people-group gold-accent"></i> Manage (Committee)';
      hint.textContent = 'Review, assign, resolve — plus delete, archive old tickets, and activity log.';
    }

    Dashboard.boot({ role: who.primary, allowDelete: isCommittee });

    // Item 6: collapse the 7-tab status row into a native <select> on
    // mobile. CSS Bundle 11 hides the nav and reveals the select below
    // 720px. UI.mobileifyTabs is idempotent and keeps the two in sync.
    UI.mobileifyTabs(document.querySelector('.tsh-tabs[aria-label="Status"]'));

    // Manager banner editor — visible to MANAGER+ when the flag is on.
    if (window.Banner && Flags.on('FEATURE_DAILY_BANNER')) {
      const card = document.getElementById('bannerEditorCard');
      if (card) {
        card.hidden = false;
        Banner.mountEditor(document.getElementById('bannerEditor'));
      }
    }
    // Announcements editor — visible to MANAGER+ when the flag is on.
    if (window.Announcements && Flags.on('FEATURE_DAILY_ANNOUNCEMENTS')) {
      const card = document.getElementById('annEditorCard');
      if (card) {
        card.hidden = false;
        Announcements.mountEditor(document.getElementById('annEditor'));
      }
    }
    // Events editor — MANAGER+ when the flag is on. Items auto-expire 1
    // day after the event (or after DAILY_NOTICE_TTL_DAYS if no event
    // date), keeping the public list trimmed without manual cleanup.
    if (window.Events && Flags.on('FEATURE_DAILY_EVENTS')) {
      const card = document.getElementById('eventsEditorCard');
      if (card) {
        card.hidden = false;
        Events.mountEditor(document.getElementById('eventsEditor'));
      }
    }
    // Polls editor + voter panel — visible to MANAGER+ when the flag is on.
    if (window.Polls && Flags.on('FEATURE_DAILY_POLLS')) {
      const card = document.getElementById('pollsEditorCard');
      if (card) {
        card.hidden = false;
        Polls.mountEditor(document.getElementById('pollsEditor'));
        Polls.mountVotersPanel(document.getElementById('pollsVoters'));
      }
    }

    if (isCommittee) {
      const bulkBtn  = document.getElementById('bulkArchiveBtn');
      const auditBtn = document.getElementById('auditBtn');
      bulkBtn.hidden = false;
      bulkBtn.addEventListener('click', async () => {
        const ok = await UI.confirmModal('Archive old resolved/rejected tickets',
          'Removes every resolved or rejected ticket older than the configured cutoff. The action is recorded in the activity log. Continue?');
        if (!ok) return;
        try {
          const res = await Api.post('/issues/bulk-archive', { confirm: true });
          UI.toast(`Archived ${res.archived || 0} ticket(s).`, { kind: 'success' });
          Dashboard.reload();
        } catch (e) { UI.toast(e.message || 'Archive failed.', { kind: 'danger' }); }
      });

      if (Flags.on('FEATURE_DAILY_AUDIT_LOG_UI')) {
        auditBtn.hidden = false;
        auditBtn.addEventListener('click', async () => {
          try {
            const entries = await Api.get('/audit?limit=200');
            const body = document.createElement('div');
            body.className = 'tsh-audit-list';
            for (const e of entries) {
              const row = UI.el('div', { class: 'tsh-audit-row' },
                UI.el('span', { class: 'tsh-mono tsh-text-muted' }, new Date(e.at).toLocaleString()),
                UI.el('span', { class: 'tsh-mono' }, e.actor),
                UI.el('span', null, e.action),
                UI.el('span', { class: 'tsh-text-muted' }, e.target || ''),
                UI.el('span', { class: 'tsh-text-faint' }, e.detail || ''));
              body.appendChild(row);
            }
            UI.modal({ title: 'Activity log (most recent first)', body, actions: [{ label: 'Close', value: true }] });
          } catch (e) { UI.toast(e.message || 'Activity log unavailable.', { kind: 'danger' }); }
        });
      }
    }

    // ----- Column legends (UI.Tip) ----------------------------------------
    // Click any <th data-tsh-tip="..."> to see a short explanation. The tip
    // widget is the same one settings.html uses for per-field help.
    const COLUMN_HELP = {
      id: {
        title: 'ID',
        html:
          '<p>Short ticket reference, e.g. <code>DLY-00012</code>. Auto-issued ' +
          'by the worker when a resident submits the Daily Report form.</p>' +
          '<p>Click the row to open the full ticket with photos and history.</p>',
      },
      tower: {
        title: 'Tower',
        html:
          '<p>The tower/block selected by the reporter. Controlled list is ' +
          'maintained in <code>Settings &rarr; Lists &rarr; Towers</code>.</p>' +
          '<p>Use the <strong>All towers</strong> dropdown above to filter.</p>',
      },
      category: {
        title: 'Category',
        html:
          '<p>What kind of issue this is &mdash; Plumbing, Electrical, Lift, ' +
          'Security, Common Area, etc. Controlled list lives under ' +
          '<code>Settings &rarr; Lists &rarr; Categories</code>.</p>',
      },
      severity: {
        title: 'Severity',
        html:
          '<p>Reporter-chosen impact level:</p>' +
          '<p><strong>Critical</strong> &mdash; safety risk, immediate attention.<br>' +
          '<strong>High</strong> &mdash; broken essential service.<br>' +
          '<strong>Medium</strong> &mdash; degraded but usable.<br>' +
          '<strong>Low</strong> &mdash; cosmetic or convenience.</p>' +
          '<p>Committee can re-classify when triaging.</p>',
      },
      status: {
        title: 'Status',
        html:
          '<p>Workflow stage. Tabs above filter by status:</p>' +
          '<p><strong>New</strong> &rarr; <strong>Reviewing</strong> &rarr; ' +
          '<strong>Assigned</strong> &rarr; <strong>In progress</strong> &rarr; ' +
          '<strong>Resolved</strong> (or <strong>Rejected</strong>).</p>' +
          '<p>Use row actions to move a ticket through these states.</p>',
      },
      age: {
        title: 'Age',
        html:
          '<p>How long since the ticket was submitted, relative to now. ' +
          'Tickets that turn red have crossed the SLA threshold configured ' +
          'in <code>Settings &rarr; Tunables &rarr; SLA_HOURS_*</code>.</p>',
      },
      actions: {
        title: 'Actions',
        html:
          '<p>Per-ticket buttons available to your role:</p>' +
          '<p><strong>Open</strong> &mdash; full detail view.<br>' +
          '<strong>Assign / Reassign</strong> &mdash; route to a builder or vendor.<br>' +
          '<strong>Status</strong> &mdash; advance through the workflow.<br>' +
          '<strong>Delete / Archive</strong> &mdash; Committee only.</p>',
      },
    };

    const thead = document.querySelector('#issuesTable thead');
    if (thead && window.UI && UI.Tip) {
      // Mark every legend header as a real button for a11y + cursor + focus ring.
      for (const th of thead.querySelectorAll('th[data-tsh-tip]')) {
        const key = th.dataset.tshTip;
        if (!COLUMN_HELP[key]) continue;
        th.setAttribute('role', 'button');
        th.setAttribute('tabindex', '0');
        th.setAttribute('aria-expanded', 'false');
        th.setAttribute('aria-controls', 'tshTip');
        th.setAttribute('title', `What is "${COLUMN_HELP[key].title}"? Click for a description.`);
        th.style.cursor = 'help';
      }
      const openFor = (th) => {
        const info = COLUMN_HELP[th.dataset.tshTip];
        if (info) UI.Tip.show(info.title, info.html, th);
      };
      thead.addEventListener('click', (e) => {
        const th = e.target && e.target.closest && e.target.closest('th[data-tsh-tip]');
        if (!th) return;
        e.preventDefault();
        openFor(th);
      });
      thead.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter' && e.key !== ' ') return;
        const th = e.target && e.target.closest && e.target.closest('th[data-tsh-tip]');
        if (!th) return;
        e.preventDefault();
        openFor(th);
      });
    }
  })();
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Public board · TSH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1a1f2e" />
  <link rel="icon" href="./assets/images/TaLogo.png" type="image/png" />
  <script>(function(){try{var t=localStorage.getItem('tsh_theme');if(t!=='dark'&&t!=='light'&&t!=='medium')t='light';if(t!=='dark')document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./assets/css/theme.css?v=13" />
</head>
<body class="tsh-page">
  <div data-include="header"></div>
  <div data-include="toast"></div>
  <div data-include="modal"></div>

  <main class="tsh-main">
    <section class="tsh-card">
      <header class="tsh-card-head tsh-card-head-row">
        <div>
          <h1><i class="fas fa-list-check gold-accent"></i> Public board</h1>
          <p class="tsh-sub">All current daily issues. Personal details are hidden.</p>
        </div>
        <label class="tsh-field tsh-field-inline tsh-search">
          <span class="tsh-visually-hidden">Search ticket id</span>
          <input type="search" id="searchInput" placeholder="DLY-00042…" autocomplete="off" />
        </label>
      </header>

      <nav class="tsh-tabs" role="tablist" aria-label="Status filter">
        <button type="button" role="tab" aria-selected="true" data-filter="all"        class="tsh-tab tsh-tab-active">All</button>
        <button type="button" role="tab" aria-selected="false" data-filter="new"        class="tsh-tab">New</button>
        <button type="button" role="tab" aria-selected="false" data-filter="triaging"   class="tsh-tab">Triaging</button>
        <button type="button" role="tab" aria-selected="false" data-filter="assigned"   class="tsh-tab">Assigned</button>
        <button type="button" role="tab" aria-selected="false" data-filter="in_progress" class="tsh-tab">In progress</button>
        <button type="button" role="tab" aria-selected="false" data-filter="resolved"   class="tsh-tab" data-tsh-flag="FEATURE_DAILY_PUBLIC_RESOLVED">Resolved</button>
        <button type="button" role="tab" aria-selected="false" data-filter="rejected"   class="tsh-tab" data-tsh-flag="FEATURE_DAILY_PUBLIC_REJECTED">Rejected</button>
      </nav>

      <div id="myReportsBanner" class="tsh-filter-banner" hidden></div>

      <div id="boardList" class="tsh-board-list" aria-live="polite"></div>
      <div id="boardEmpty" class="tsh-state tsh-state-empty" hidden>
        <i class="tsh-state-icon fas fa-inbox"></i>
        <p class="tsh-state-title">No issues match this filter</p>
        <p class="tsh-state-msg">Try a different tab or clear the search.</p>
      </div>
    </section>
  </main>

  <div data-include="footer"></div>

  <script src="./assets/js/config.js?v=11"></script>
  <script src="./assets/js/partials.js?v=13"></script>
  <script src="./assets/js/api.js?v=11"></script>
  <script src="./assets/js/auth.js?v=11"></script>
  <script src="./assets/js/flags.js?v=11"></script>
  <script src="./assets/js/ui.js?v=13"></script>
  <script>
  (async () => {
    await Partials.mount();
    await Auth.init({ clientId: window.TSH_GOOGLE_CLIENT_ID });
    UI.bindHeader();

    try { await Flags.ready(); }
    catch (_e) { /* fall through — list still works */ }

    try { Flags.ensureFeature('FEATURE_DAILY_PUBLIC_BOARD', 'Public board'); }
    catch (_e) { return; }

    // Hide flag-gated tabs.
    for (const el of document.querySelectorAll('.tsh-tab[data-tsh-flag]')) {
      const flag = el.getAttribute('data-tsh-flag');
      if (Flags.raw && !Flags.on(flag)) el.hidden = true;
    }

    let all = [];
    const list  = document.getElementById('boardList');
    const empty = document.getElementById('boardEmpty');
    list.appendChild(UI.stateLoading('Loading board\u2026'));
    try {
      const res = await Api.get('/issues/public');
      all = Array.isArray(res) ? res : (res.items || []);
    } catch (e) {
      list.innerHTML = '';
      list.appendChild(UI.stateError('Could not load the board.'));
      UI.toast('Could not load the board.', { kind: 'danger' });
      console.error(e); return;
    }

    let filter = 'all';
    let query  = '';

    // "My reports" filter: client-side narrowing keyed off the visitor's own
    // tsh_my_tickets entries (or a ?ids= deep-link). When active, the status
    // tabs still work — they further narrow the my-set.
    const banner = document.getElementById('myReportsBanner');
    const params = new URLSearchParams(location.search);
    const myFlag = params.get('my') === '1';
    const idsParam = (params.get('ids') || '').split(',').map((s) => s.trim()).filter(Boolean);
    const myIds = idsParam.length ? idsParam : (myFlag ? UI.MyReports.ids() : []);
    const myActive = myFlag || idsParam.length > 0;
    const mySet = new Set(myIds.map((s) => s.toUpperCase()));

    function paintBanner() {
      if (!myActive) { banner.hidden = true; return; }
      banner.hidden = false;
      banner.innerHTML = '';
      const n = mySet.size;
      banner.appendChild(UI.el('span', null,
        n
          ? `Showing your ${n} report${n > 1 ? 's' : ''} filed from this device.`
          : 'You have no reports filed from this device yet.'));
      banner.appendChild(UI.el('button', {
        type: 'button', class: 'tsh-filter-banner-clear',
        onclick: () => { location.href = './public-board.html'; },
      }, 'Show all'));
    }
    paintBanner();

    function render() {
      list.innerHTML = '';
      const q = query.trim().toUpperCase();
      const filtered = all.filter((i) => {
        if (myActive && !mySet.has(String(i.id || '').toUpperCase())) return false;
        if (filter !== 'all' && i.status !== filter) return false;
        if (q && !(i.id || '').toUpperCase().includes(q)) return false;
        return true;
      });
      empty.hidden = filtered.length !== 0;
      for (const i of filtered) list.appendChild(card(i));
      // Attach lightbox to any photo thumbs that were just rendered. Re-runs
      // are cheap — attach() skips grids already bound.
      if (UI.Lightbox && UI.Lightbox.attach) UI.Lightbox.attach(list);
    }

    function card(i) {
      const head = UI.el('div', { class: 'tsh-board-card-head' },
        UI.el('code', { class: 'tsh-id' }, i.id),
        UI.statusPill(i.status));
      const meta = UI.el('div', { class: 'tsh-board-card-meta' },
        UI.el('span', null, i.tower || '—'),
        UI.el('span', null, ' · '),
        UI.el('span', null, i.category || '—'),
        UI.el('span', null, ' · '),
        UI.el('span', { class: 'tsh-text-muted' }, UI.formatRel(i.updatedAt || i.createdAt)));
      const body = UI.el('p', { class: 'tsh-board-card-body' }, (i.description || '').slice(0, 200));
      const article = UI.el('article', { class: 'tsh-board-card' }, head, meta, body);
      const urls = Array.isArray(i.photoUrls) ? i.photoUrls : (Array.isArray(i.photos) ? i.photos : []);
      if (urls.length) {
        const thumbs = UI.el('div', { class: 'tsh-photo-grid tsh-board-thumbs' });
        for (const url of urls.slice(0, 4)) {
          thumbs.appendChild(UI.el('img', { src: url, 'data-tsh-full': url, alt: '', loading: 'lazy' }));
        }
        article.appendChild(thumbs);
      }
      return article;
    }

    for (const tab of document.querySelectorAll('.tsh-tab')) {
      tab.addEventListener('click', () => {
        for (const t of document.querySelectorAll('.tsh-tab')) {
          t.classList.remove('tsh-tab-active');
          t.setAttribute('aria-selected', 'false');
        }
        tab.classList.add('tsh-tab-active');
        tab.setAttribute('aria-selected', 'true');
        filter = tab.dataset.filter;
        render();
      });
    }
    document.getElementById('searchInput').addEventListener('input', (e) => {
      query = e.target.value; render();
    });

    render();
  })();
  </script>
</body>
</html>

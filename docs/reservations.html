<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Reservations Â· TSH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1a1f2e" />
  <meta name="description" content="Reserve community facilities at The Address." />
  <link rel="icon" href="./assets/images/TaLogo.png" type="image/png" />
  <script>(function(){try{var t=localStorage.getItem('tsh_theme');if(t!=='dark'&&t!=='light'&&t!=='medium')t='light';if(t!=='dark')document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./assets/css/theme.css?v=85" />
  <style>
    /* Reservation-specific tweaks. Kept inline for Phase 1; will move to
       theme.css in a follow-up once the design is settled. */
    .tsh-res-picker { display: grid; grid-template-columns: repeat(auto-fit,minmax(240px,1fr)); gap: 12px; margin-bottom: 16px; }
    .tsh-res-picker .tsh-res-fac { padding: 14px 16px; border: 1px solid var(--tsh-border, #d1d5db); border-radius: 12px; background: var(--tsh-card, #fff); cursor: pointer; display: flex; flex-direction: column; gap: 4px; transition: all .12s; }
    .tsh-res-picker .tsh-res-fac:hover { border-color: var(--tsh-primary, #2563eb); }
    .tsh-res-picker .tsh-res-fac.tsh-res-fac-active { border-color: var(--tsh-primary, #2563eb); background: color-mix(in srgb, var(--tsh-primary, #2563eb) 8%, transparent); box-shadow: 0 2px 6px rgba(0,0,0,.05); }
    .tsh-res-fac-name { font-weight: 600; font-size: 15px; }
    .tsh-res-fac-desc { font-size: 12px; opacity: .75; }
    .tsh-res-fac-meta { font-size: 11px; opacity: .6; margin-top: 4px; }

    .tsh-res-grid { display: grid; grid-template-columns: 100px repeat(3, 1fr); gap: 6px; margin: 12px 0; }
    .tsh-res-grid-head { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; opacity: .7; padding: 6px 4px; text-align: center; }
    .tsh-res-grid-day { padding: 8px 4px; font-size: 13px; font-weight: 500; display: flex; flex-direction: column; justify-content: center; }
    .tsh-res-grid-day .tsh-res-grid-daydate { opacity: .7; font-size: 11px; }
    .tsh-res-grid-cell { padding: 10px 6px; border-radius: 8px; text-align: center; font-size: 12px; font-weight: 500; cursor: pointer; background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; transition: all .12s; }
    .tsh-res-grid-cell:hover { transform: translateY(-1px); box-shadow: 0 2px 6px rgba(0,0,0,.08); }
    .tsh-res-grid-cell-held { background: #fef3c7; color: #92400e; border-color: #fcd34d; }
    .tsh-res-grid-cell-confirmed { background: #fee2e2; color: #991b1b; border-color: #fca5a5; cursor: not-allowed; }
    .tsh-res-grid-cell-confirmed:hover { transform: none; box-shadow: none; }
    .tsh-res-grid-cell-blackout { background: #f3f4f6; color: #6b7280; border-color: #e5e7eb; cursor: not-allowed; }
    .tsh-res-grid-cell-blackout:hover { transform: none; box-shadow: none; }
    .tsh-res-grid-cell-past { opacity: .35; pointer-events: none; }

    .tsh-res-range { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
    .tsh-res-range label { font-size: 13px; font-weight: 500; }

    .tsh-res-cards { display: grid; grid-template-columns: repeat(auto-fill,minmax(300px,1fr)); gap: 12px; }
    .tsh-res-card { padding: 14px 16px; border: 1px solid var(--tsh-border, #d1d5db); border-radius: 12px; background: var(--tsh-card, #fff); display: flex; flex-direction: column; gap: 8px; }
    .tsh-res-card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .tsh-res-card-title { font-weight: 600; font-size: 14px; margin: 0; }
    .tsh-res-card-meta { font-size: 12px; opacity: .8; line-height: 1.5; }
    .tsh-res-card-purpose { font-size: 13px; line-height: 1.4; }
    .tsh-res-card-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .tsh-res-card-owner { font-size: 11px; opacity: .6; margin-top: 2px; }

    .tsh-res-pill { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
    .tsh-res-pill-requested   { background: #dbeafe; color: #1e40af; }
    .tsh-res-pill-under-review{ background: #fef3c7; color: #92400e; }
    .tsh-res-pill-confirmed   { background: #d1fae5; color: #065f46; }
    .tsh-res-pill-rejected    { background: #fee2e2; color: #991b1b; }
    .tsh-res-pill-cancelled   { background: #f3f4f6; color: #4b5563; }
    .tsh-res-pill-pay-not-required { background: #f3f4f6; color: #4b5563; }
    .tsh-res-pill-pay-pending      { background: #fef3c7; color: #92400e; }
    .tsh-res-pill-pay-submitted    { background: #dbeafe; color: #1e40af; }
    .tsh-res-pill-pay-verified     { background: #d1fae5; color: #065f46; }
    .tsh-res-pill-pay-rejected     { background: #fee2e2; color: #991b1b; }

    .tsh-res-card-payment { font-size: 12px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-top: 4px; padding-top: 6px; border-top: 1px dashed var(--tsh-border, #e5e7eb); }
    .tsh-res-payment-panel { margin-top: 8px; padding: 10px 12px; border-radius: 10px; background: #f9fafb; border: 1px solid var(--tsh-border, #e5e7eb); }
    .tsh-res-proof-list { list-style: none; padding: 0; margin: 8px 0 0; display: flex; flex-direction: column; gap: 4px; font-size: 13px; }
    .tsh-res-proof-list a { color: var(--tsh-primary, #2563eb); text-decoration: none; }
    .tsh-res-proof-list a:hover { text-decoration: underline; }

    .tsh-res-timeline { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 10px; }
    .tsh-res-timeline li { display: grid; grid-template-columns: 22px 1fr; gap: 10px; font-size: 13px; }
    .tsh-res-timeline .tsh-res-tl-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 6px; background: var(--tsh-primary, #2563eb); justify-self: center; }
    .tsh-res-timeline .tsh-res-tl-body { display: flex; flex-direction: column; gap: 2px; }
    .tsh-res-timeline .tsh-res-tl-head { font-weight: 500; }
    .tsh-res-timeline .tsh-res-tl-note { font-size: 12px; opacity: .8; }
    .tsh-res-timeline .tsh-res-tl-when { font-size: 11px; opacity: .6; }

    .tsh-res-legend { display: flex; gap: 12px; flex-wrap: wrap; font-size: 11px; opacity: .8; margin-top: 6px; }
    .tsh-res-legend span { display: inline-flex; align-items: center; gap: 4px; }
    .tsh-res-legend .tsh-res-swatch { width: 12px; height: 12px; border-radius: 3px; border: 1px solid rgba(0,0,0,.1); }

    @media (max-width: 640px) {
      .tsh-res-grid { grid-template-columns: 76px repeat(3, 1fr); gap: 4px; }
      .tsh-res-grid-cell { padding: 8px 3px; font-size: 11px; }
      .tsh-res-grid-day { padding: 6px 2px; font-size: 12px; }
    }

    /* Facility bar (dropdown + settings). Replaces the old tile-picker. */
    .tsh-res-fac-bar { display: flex; align-items: flex-end; gap: 12px; flex-wrap: wrap; margin-bottom: 4px; }
    .tsh-res-fac-select-wrap { display: flex; flex-direction: column; gap: 4px; min-width: 240px; flex: 1 1 280px; }
    .tsh-res-fac-select { padding: 10px 12px; border-radius: 8px; border: 1px solid var(--tsh-border, #d1d5db); background: var(--tsh-card, #fff); font-size: 15px; }

    /* Rate card + usage guidelines rendered inside the booking modal. */
    .tsh-res-ratecard { margin: 8px 0 4px; padding: 8px 10px; border-radius: 8px; background: #f9fafb; border: 1px solid var(--tsh-border, #e5e7eb); font-size: 12px; }
    .tsh-res-ratecard table { width: 100%; border-collapse: collapse; }
    .tsh-res-ratecard th, .tsh-res-ratecard td { padding: 4px 6px; text-align: left; border-bottom: 1px dashed var(--tsh-border, #e5e7eb); }
    .tsh-res-ratecard th { font-weight: 600; opacity: .75; }
    .tsh-res-ratecard tr:last-child th, .tsh-res-ratecard tr:last-child td { border-bottom: 0; }
    .tsh-res-ratecard .tsh-res-rc-amount { text-align: right; white-space: nowrap; font-weight: 600; }
    .tsh-res-guide { margin: 6px 0; padding: 8px 10px 8px 12px; border-radius: 8px; background: #f0f9ff; border-left: 3px solid #38bdf8; font-size: 12px; }
    .tsh-res-guide h5 { margin: 0 0 4px; font-size: 12px; font-weight: 600; color: #0369a1; }
    .tsh-res-guide ul { margin: 0 0 4px 18px; padding: 0; }
    .tsh-res-guide li { line-height: 1.4; }
    .tsh-res-guide + .tsh-res-guide { margin-top: 6px; }

    /* Settings-modal helpers */
    .tsh-res-set { display: flex; flex-direction: column; gap: 10px; font-size: 13px; }
    .tsh-res-set label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; }
    .tsh-res-set label > span { font-weight: 500; }
    .tsh-res-set input, .tsh-res-set textarea, .tsh-res-set select {
      padding: 7px 10px; border-radius: 6px; border: 1px solid var(--tsh-border, #d1d5db); background: var(--tsh-card, #fff); font: inherit; width: 100%;
    }
    .tsh-res-set textarea { min-height: 80px; resize: vertical; }
    .tsh-res-set-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .tsh-res-set-list { display: flex; flex-direction: column; gap: 6px; }
    .tsh-res-set-list .tsh-res-set-row { display: grid; grid-template-columns: 2fr 1fr auto; gap: 6px; align-items: center; }
    .tsh-res-set-list .tsh-res-set-row-simple { display: grid; grid-template-columns: 1fr auto; gap: 6px; align-items: center; }
    .tsh-res-set-list .tsh-res-set-del { background: transparent; border: 0; color: #dc2626; cursor: pointer; padding: 4px; }
    .tsh-res-set-add { align-self: flex-start; background: transparent; border: 1px dashed var(--tsh-border, #d1d5db); border-radius: 6px; padding: 6px 10px; font-size: 12px; cursor: pointer; }
    .tsh-res-set-add:hover { border-color: var(--tsh-primary, #2563eb); color: var(--tsh-primary, #2563eb); }
    .tsh-res-set fieldset { border: 1px solid var(--tsh-border, #e5e7eb); border-radius: 8px; padding: 8px 10px; }
    .tsh-res-set legend { font-size: 12px; font-weight: 600; padding: 0 4px; color: var(--tsh-muted, #6b7280); }
    @media (max-width: 640px) {
      .tsh-res-set-grid { grid-template-columns: 1fr; }
      .tsh-res-set-list .tsh-res-set-row { grid-template-columns: 1fr; }
    }

    /* ===== Google Calendar-style week/day view ============================
       Grid-based: a time gutter on the left + N day columns. Busy blocks
       are absolutely positioned inside each day column using top/height
       computed from startMin/endMin. Every 30-min row is clickable so a
       resident can quickly start a booking at that time. */
    .tsh-cal-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; flex-wrap: wrap; margin: 4px 0 8px;
    }
    .tsh-cal-nav { display: flex; align-items: center; gap: 6px; }
    .tsh-cal-label { font-weight: 600; font-size: 14px; margin-left: 6px; }
    .tsh-cal-views { display: inline-flex; border: 1px solid var(--tsh-border, #d1d5db); border-radius: 8px; overflow: hidden; }
    .tsh-cal-view { padding: 6px 12px; font-size: 13px; background: transparent; border: 0; cursor: pointer; color: var(--tsh-text, #111827); }
    .tsh-cal-view + .tsh-cal-view { border-left: 1px solid var(--tsh-border, #d1d5db); }
    .tsh-cal-view:disabled { opacity: .45; cursor: not-allowed; }
    .tsh-cal-view-active { background: color-mix(in srgb, var(--tsh-primary, #2563eb) 12%, transparent); color: var(--tsh-primary, #2563eb); font-weight: 600; }

    .tsh-cal-legend { display: flex; gap: 12px; flex-wrap: wrap; font-size: 11px; opacity: .8; margin-bottom: 6px; }
    .tsh-cal-legend span { display: inline-flex; align-items: center; gap: 4px; }
    .tsh-cal-swatch { width: 12px; height: 12px; border-radius: 3px; border: 1px solid rgba(0,0,0,.1); display: inline-block; }
    .tsh-cal-sw-free      { background: transparent; border-color: var(--tsh-border, #d1d5db); }
    .tsh-cal-sw-held      { background: #fef3c7; border-color: #fcd34d; }
    .tsh-cal-sw-confirmed { background: #fee2e2; border-color: #fca5a5; }
    .tsh-cal-sw-blackout  { background: #f3f4f6; border-color: #e5e7eb; }

    .tsh-cal-host { border: 1px solid var(--tsh-border, #d1d5db); border-radius: 12px; overflow: hidden auto; background: var(--tsh-card, #fff); max-height: var(--tsh-cal-max-h, 560px); scroll-behavior: smooth; }
    .tsh-cal-week {
      display: grid;
      grid-template-columns: 56px repeat(var(--cal-cols, 7), minmax(0, 1fr));
      /* Height is set per instance from JS based on step count. */
    }
    .tsh-cal-head {
      display: contents;
    }
    .tsh-cal-corner, .tsh-cal-daycol-head, .tsh-cal-timecol-cell, .tsh-cal-daycol {
      border-bottom: 1px solid var(--tsh-border, #e5e7eb);
    }
    /* Pin header row while the body scrolls so day/date labels stay in view. */
    .tsh-cal-corner, .tsh-cal-daycol-head {
      position: sticky; top: 0; z-index: 5;
    }
    .tsh-cal-corner { background: var(--tsh-card, #fff); border-right: 1px solid var(--tsh-border, #e5e7eb); }
    .tsh-cal-daycol-head {
      padding: 8px 4px; text-align: center; font-size: 12px; font-weight: 500;
      border-right: 1px solid var(--tsh-border, #e5e7eb);
      background: var(--tsh-card-alt, #f9fafb);
    }
    .tsh-cal-daycol-head strong { display: block; font-size: 18px; font-weight: 600; }
    .tsh-cal-daycol-head.tsh-cal-today strong { color: var(--tsh-primary, #2563eb); }
    .tsh-cal-daycol-head.tsh-cal-past { opacity: .55; }
    .tsh-cal-daycol-head.tsh-cal-blackout { background: repeating-linear-gradient(45deg,#f3f4f6,#f3f4f6 6px,#e5e7eb 6px,#e5e7eb 12px); color: #6b7280; }

    /* Body: one column per day, containing 30-min click rows + absolute busy blocks. */
    .tsh-cal-body { display: contents; }
    .tsh-cal-timecol { border-right: 1px solid var(--tsh-border, #e5e7eb); position: relative; background: var(--tsh-card, #fff); }
    .tsh-cal-timecol-cell {
      height: var(--cal-row-h, 24px);
      font-size: 10px; padding: 2px 4px 0 4px; text-align: right;
      color: var(--tsh-muted, #6b7280);
      border-bottom: 1px dashed var(--tsh-border, #eef0f3);
    }
    /* Hour boundary: solid divider instead of dashed one, and stronger font. */
    .tsh-cal-timecol-cell.tsh-cal-hour { border-bottom-style: solid; border-bottom-color: var(--tsh-border, #e5e7eb); font-weight: 600; color: var(--tsh-text, #111827); font-size: 11px; }
    .tsh-cal-daycol { position: relative; border-right: 1px solid var(--tsh-border, #e5e7eb); }
    .tsh-cal-slot {
      height: var(--cal-row-h, 24px);
      border-bottom: 1px dashed var(--tsh-border, #eef0f3);
      cursor: pointer;
      transition: background 100ms ease;
    }
    .tsh-cal-slot.tsh-cal-hour { border-bottom-style: solid; border-bottom-color: var(--tsh-border, #e5e7eb); }
    .tsh-cal-slot:hover { background: color-mix(in srgb, var(--tsh-primary, #2563eb) 12%, transparent); box-shadow: inset 2px 0 0 var(--tsh-primary, #2563eb); }
    .tsh-cal-slot.tsh-cal-slot-past { cursor: not-allowed; background: repeating-linear-gradient(45deg, transparent, transparent 4px, rgba(0,0,0,.03) 4px, rgba(0,0,0,.03) 8px); }
    .tsh-cal-slot.tsh-cal-slot-past:hover { background: repeating-linear-gradient(45deg, transparent, transparent 4px, rgba(0,0,0,.03) 4px, rgba(0,0,0,.03) 8px); box-shadow: none; }
    .tsh-cal-daycol.tsh-cal-blackout .tsh-cal-slot { cursor: not-allowed; background: repeating-linear-gradient(45deg, #f3f4f6, #f3f4f6 6px, #e5e7eb 6px, #e5e7eb 12px); }

    /* ----- Sleek quick-pick strip -----
       One row of hour chips summarising availability for the currently
       anchored day (today when viewing the week). Click a free chip to
       jump straight into the book modal. */
    .tsh-cal-quick { display: flex; align-items: center; gap: 10px; margin: 6px 0 8px; padding: 8px 10px; border: 1px solid var(--tsh-border, #e5e7eb); border-radius: 10px; background: var(--tsh-card-alt, #f9fafb); flex-wrap: wrap; }
    .tsh-cal-quick-label { font-size: 11px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: var(--tsh-muted, #6b7280); flex: 0 0 auto; }
    .tsh-cal-quick-chips { display: flex; gap: 4px; flex-wrap: wrap; }
    .tsh-cal-quick-chip {
      padding: 4px 9px; border-radius: 999px; border: 1px solid var(--tsh-border, #d1d5db);
      background: var(--tsh-card, #fff); color: var(--tsh-text, #111827);
      font-size: 12px; font-weight: 500; cursor: pointer; line-height: 1.2;
      transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
    }
    .tsh-cal-quick-chip:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 2px 6px rgba(0,0,0,.08); border-color: var(--tsh-primary, #2563eb); }
    .tsh-cal-quick-chip.tsh-cal-quick-busy    { background: #fef3c7; color: #92400e; border-color: #fcd34d; }
    .tsh-cal-quick-chip.tsh-cal-quick-full    { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
    .tsh-cal-quick-chip.tsh-cal-quick-past    { opacity: .5; cursor: not-allowed; }
    .tsh-cal-quick-chip.tsh-cal-quick-past:hover { transform: none; box-shadow: none; border-color: var(--tsh-border, #d1d5db); }
    .tsh-cal-quick-chip.tsh-cal-quick-blocked { background: repeating-linear-gradient(45deg,#f3f4f6,#f3f4f6 4px,#e5e7eb 4px,#e5e7eb 8px); color: #6b7280; cursor: not-allowed; }
    .tsh-cal-quick-empty { font-size: 12px; color: var(--tsh-muted, #6b7280); }

    .tsh-cal-event {
      position: absolute; left: 2px; right: 2px;
      border-radius: 6px; padding: 2px 6px;
      font-size: 11px; font-weight: 500; line-height: 1.25;
      overflow: hidden; text-overflow: ellipsis;
      cursor: pointer;
      border: 1px solid transparent;
      box-shadow: 0 1px 2px rgba(0,0,0,.06);
    }
    .tsh-cal-event-time { display: block; font-size: 10px; opacity: .85; font-weight: 500; }
    .tsh-cal-event-title { display: block; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tsh-cal-event.tsh-cal-ev-held      { background: #fef3c7; color: #92400e; border-color: #fcd34d; }
    .tsh-cal-event.tsh-cal-ev-confirmed { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }

    /* Current-hour indicator (thin red line, only when Today is in view). */
    .tsh-cal-now {
      position: absolute; left: 0; right: 0; height: 2px;
      background: #ef4444; box-shadow: 0 0 0 1px rgba(255,255,255,.6);
      z-index: 4; pointer-events: none;
    }
    .tsh-cal-now::before {
      content: ''; position: absolute; left: -3px; top: -3px;
      width: 8px; height: 8px; border-radius: 50%; background: #ef4444;
    }

    @media (max-width: 720px) {
      .tsh-cal-week { grid-template-columns: 44px repeat(var(--cal-cols, 7), minmax(0, 1fr)); }
      .tsh-cal-timecol-cell { font-size: 9px; padding: 1px 2px 0 2px; }
      .tsh-cal-daycol-head { font-size: 11px; padding: 6px 2px; }
      .tsh-cal-daycol-head strong { font-size: 14px; }
      .tsh-cal-event { font-size: 10px; padding: 2px 4px; }
      .tsh-cal-event-time { display: none; }
      .tsh-cal-legend { font-size: 10px; gap: 8px; }
      .tsh-cal-label { font-size: 13px; }
    }
    @media (max-width: 480px) {
      /* On phones the 7-day week is unreadable — degrade to Day view. */
      .tsh-cal-force-day .tsh-cal-week { grid-template-columns: 56px 1fr; }
    }
  </style>
</head>
<body class="tsh-page">
  <div data-include="header"></div>
  <div data-include="pdf-report"></div>
  <div data-include="toast"></div>
  <div data-include="modal"></div>

  <main class="tsh-main tsh-main-wide">

    <!-- Signed-out gate -->
    <section class="tsh-card" data-res-signin hidden>
      <header class="tsh-card-head">
        <h1><i class="fas fa-calendar-check gold-accent"></i> Reservations</h1>
      </header>
      <div class="tsh-empty">
        <p>Please sign in to view and manage facility reservations.</p>
        <p><button type="button" class="tsh-btn tsh-btn-primary" data-tsh-signin><i class="fas fa-right-to-bracket"></i>Sign in with Google</button></p>
      </div>
    </section>

    <!-- Main workspace -->
    <section class="tsh-card" data-res-main hidden>
      <header class="tsh-card-head tsh-card-head-row">
        <div>
          <h1><i class="fas fa-calendar-check gold-accent"></i> Facility Reservations</h1>
          <p class="tsh-sub" id="resSub">Reserve community facilities. Owner remains with you even if staff creates the booking on your behalf.</p>
        </div>
      </header>

      <!-- Tabs -->
      <div class="tsh-tabs" role="tablist" aria-label="Reservation views">
        <button type="button" class="tsh-tab tsh-tab-active" role="tab" aria-selected="true"  data-res-tab="book"><i class="fas fa-calendar-plus"></i> Book</button>
        <button type="button" class="tsh-tab"               role="tab" aria-selected="false" data-res-tab="mine"><i class="fas fa-bookmark"></i> My reservations <span class="tsh-tab-count" data-res-count="mine">0</span></button>
        <button type="button" class="tsh-tab" role="tab" aria-selected="false" data-res-tab="manage" hidden data-res-staff-only><i class="fas fa-user-shield"></i> Manage <span class="tsh-tab-count" data-res-count="manage">0</span></button>
      </div>

      <!-- BOOK TAB -->
      <section class="tsh-tab-panel" data-res-panel="book">
        <div class="tsh-res-fac-bar">
          <label class="tsh-res-fac-select-wrap">
            <span class="tsh-form-label"><i class="fas fa-building-columns"></i> Facility</span>
            <select id="resFacilitySelect" class="tsh-res-fac-select"></select>
          </label>
          <button type="button" class="tsh-btn tsh-btn-ghost tsh-btn-sm" id="resFacilitySettings" hidden data-res-staff-only>
            <i class="fas fa-sliders"></i> Settings &amp; rates
          </button>
          <button type="button" class="tsh-btn tsh-btn-ghost tsh-btn-sm" id="resReceiptTemplate" hidden data-res-staff-only
                  title="Manager / Committee / Admin: upload the letterhead used as the background on booking receipts.">
            <i class="fas fa-file-image"></i> Receipt template
          </button>
        </div>
        <p id="resFacilityBlurb" class="tsh-hint" style="margin:2px 0 10px"></p>

        <div id="resBookBody" hidden>
          <div class="tsh-cal-toolbar">
            <div class="tsh-cal-nav">
              <button type="button" class="tsh-btn tsh-btn-ghost tsh-btn-sm" id="resCalPrev" aria-label="Previous week"><i class="fas fa-chevron-left"></i></button>
              <button type="button" class="tsh-btn tsh-btn-ghost tsh-btn-sm" id="resCalToday">Today</button>
              <button type="button" class="tsh-btn tsh-btn-ghost tsh-btn-sm" id="resCalNext" aria-label="Next week"><i class="fas fa-chevron-right"></i></button>
              <span class="tsh-cal-label" id="resCalLabel">—</span>
            </div>
            <div class="tsh-cal-views" role="tablist" aria-label="Calendar view">
              <button type="button" class="tsh-cal-view tsh-cal-view-active" data-cal-view="week">Week</button>
              <button type="button" class="tsh-cal-view" data-cal-view="day">Day</button>
              <button type="button" class="tsh-cal-view" data-cal-view="month" disabled title="Coming next">Month</button>
            </div>
          </div>
          <div id="resFacilityRules" class="tsh-hint" style="margin:6px 0 10px"></div>
          <div class="tsh-cal-legend">
            <span><span class="tsh-cal-swatch tsh-cal-sw-free"></span> Free</span>
            <span><span class="tsh-cal-swatch tsh-cal-sw-held"></span> Requested</span>
            <span><span class="tsh-cal-swatch tsh-cal-sw-confirmed"></span> Confirmed</span>
            <span><span class="tsh-cal-swatch tsh-cal-sw-blackout"></span> Blocked</span>
          </div>
          <div id="resQuickBook" class="tsh-cal-quick" hidden></div>
          <div id="resCalendar" class="tsh-cal-host"></div>
        </div>
      </section>

      <!-- MY TAB -->
      <section class="tsh-tab-panel" data-res-panel="mine" hidden>
        <div id="resMineList" class="tsh-res-cards"></div>
      </section>

      <!-- MANAGE TAB -->
      <section class="tsh-tab-panel" data-res-panel="manage" hidden data-res-staff-only>
        <div class="tsh-res-range">
          <input type="search" id="resManageSearch" placeholder="Search by ticket id, resident, flat, phone, purposeâ€¦" style="flex:1;min-width:220px;padding:8px 12px;border-radius:8px;border:1px solid var(--tsh-border,#d1d5db);" />
          <select id="resManageStatus" style="padding:8px 12px;border-radius:8px;border:1px solid var(--tsh-border,#d1d5db);">
            <option value="all">All statuses</option>
            <option value="requested" selected>Requested</option>
            <option value="under-review">Under Review</option>
            <option value="confirmed">Confirmed</option>
            <option value="cancelled">Cancelled</option>
            <option value="rejected">Rejected</option>
          </select>
        </div>
        <div id="resManageList" class="tsh-res-cards"></div>
      </section>

    </section>
  </main>

  <div data-include="footer"></div>

  <script src="./assets/js/config.js?v=11"></script>
  <script src="./assets/js/partials.js?v=22"></script>
  <script src="./assets/js/api.js?v=11"></script>
  <script src="./assets/js/auth.js?v=11"></script>
  <script src="./assets/js/flags.js?v=13"></script>
  <script src="./assets/js/ui.js?v=51"></script>
  <script src="./assets/js/notify.js?v=1"></script>
  <script src="./assets/js/pdf-report.js?v=9"></script>
  <script src="./assets/js/reservations.js?v=9"></script>
  <script>
  (async () => {
    await Partials.mount();
    await Auth.init({ clientId: window.TSH_GOOGLE_CLIENT_ID });
    UI.bindHeader();
    Reservations.init();
    // Re-run the page controller whenever the user signs in/out so the
    // sign-in gate and role-scoped tabs update without a page reload.
    Auth.onChange(() => Reservations.init());
  })();
  </script>
</body>
</html>

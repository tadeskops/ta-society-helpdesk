<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Vehicle Registry · TSH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1a1f2e" />
  <meta name="description" content="Search which flat a vehicle is registered to. Manager and Committee may add/edit entries." />
  <link rel="icon" href="./assets/images/TaLogo.png" type="image/png" />
  <script>(function(){try{var t=localStorage.getItem('tsh_theme');if(t!=='dark'&&t!=='light'&&t!=='medium')t='light';if(t!=='dark')document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./assets/css/theme.css?v=87" />
  <style>
    /* Vehicle Registry page-scoped styles. Small enough not to warrant a
       theme.css bump; visual language matches directory / reservations. */
    .veh-search-card { padding: 1.25rem; }
    .veh-search-row { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; }
    .veh-search-row input[type="search"] {
      flex: 1 1 260px; min-width: 200px; font-size: 1.1rem;
      padding: .7rem .9rem; letter-spacing: .04em; text-transform: uppercase;
    }
    .veh-result {
      margin-top: 1rem; padding: 1rem 1.1rem; border-radius: 12px;
      background: var(--tsh-surface-2, #f6f7fb); border: 1px solid var(--tsh-border, #e2e5ee);
    }
    .veh-result[hidden] { display: none; }
    .veh-result-flat { font-size: 1.6rem; font-weight: 700; letter-spacing: .04em; }
    .veh-result-meta { color: var(--tsh-muted, #667); margin-top: .3rem; font-size: .95rem; }
    .veh-result-meta strong { color: var(--tsh-text, #223); font-weight: 600; }
    .veh-nomatch { color: var(--tsh-danger, #c33); font-weight: 600; }
    .veh-manage { margin-top: 1.5rem; }
    .veh-manage[hidden] { display: none; }
    .veh-add-grid { display: grid; grid-template-columns: 1fr 1.5fr .6fr .6fr 2fr auto; gap: .5rem; align-items: end; }
    @media (max-width: 800px) { .veh-add-grid { grid-template-columns: 1fr 1fr; } .veh-add-grid button { grid-column: span 2; } }
    .veh-list { margin-top: 1rem; display: flex; flex-direction: column; gap: .5rem; }
    .veh-flat-group { border: 1px solid var(--tsh-border, #e2e5ee); border-radius: 10px; padding: .6rem .9rem; background: var(--tsh-surface, #fff); }
    .veh-flat-group summary { cursor: pointer; font-weight: 700; letter-spacing: .04em; padding: .2rem 0; }
    .veh-flat-group summary::marker { color: var(--tsh-accent, #b48a3c); }
    .veh-row { display: grid; grid-template-columns: 1.4fr .6fr .8fr 2fr auto; gap: .5rem; align-items: center; padding: .4rem 0; border-top: 1px dashed var(--tsh-border, #e2e5ee); }
    .veh-row:first-of-type { border-top: none; }
    .veh-row .veh-reg { font-family: ui-monospace, "SF Mono", Menlo, monospace; letter-spacing: .05em; font-weight: 600; }
    .veh-row .veh-emails { font-size: .85em; color: var(--tsh-muted, #667); word-break: break-all; }
    .veh-actions { display: flex; gap: .3rem; }
    .veh-badge { display: inline-block; padding: .1rem .5rem; border-radius: 999px; font-size: .75rem; font-weight: 600;
                 background: var(--tsh-accent-soft, #eee5d0); color: var(--tsh-accent-dark, #6f5320); }
    @media (max-width: 800px) { .veh-row { grid-template-columns: 1fr 1fr; } .veh-actions { grid-column: span 2; justify-content: flex-end; } }
    .veh-count { color: var(--tsh-muted, #667); font-size: .85em; margin-left: .5em; font-weight: 400; }

    /* Tower schematic grids — one collapsible <details> per tower.
       Rows = floors (top-down, like a building elevation).
       Columns = flat units (like seat numbers on a floor). */
    .veh-tower {
      border: 1px solid var(--tsh-border, #e2e5ee); border-radius: 12px;
      padding: .6rem 1rem 1rem; margin-bottom: 1rem;
      background: var(--tsh-surface, #fff);
    }
    .veh-tower > summary {
      cursor: pointer; font-weight: 700; font-size: 1.05rem;
      padding: .3rem 0; letter-spacing: .03em;
      display: flex; align-items: baseline; gap: .5rem; flex-wrap: wrap;
    }
    .veh-tower > summary::marker { color: var(--tsh-accent, #b48a3c); }
    .veh-tower-count { color: var(--tsh-muted, #667); font-size: .82em; font-weight: 400; }
    .veh-tower-grid {
      display: grid;
      grid-template-columns: 2.6rem repeat(var(--units, 4), minmax(4.4rem, 1fr));
      gap: .4rem; margin-top: .8rem;
    }
    .veh-floor-label {
      display: grid; place-items: center;
      font-weight: 600; color: var(--tsh-muted, #667); font-size: .82em;
    }
    .veh-cell {
      min-height: 3.6rem;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: .15rem;
      padding: .35rem .25rem; border-radius: 8px;
      border: 1.5px dashed var(--tsh-border, #e2e5ee);
      background: transparent; color: var(--tsh-muted, #778);
      font-size: .78rem; cursor: pointer; font-family: inherit;
      transition: border-color .12s, background .12s, transform .08s, color .12s;
    }
    .veh-cell:hover { border-color: var(--tsh-accent, #b48a3c); color: var(--tsh-text, #223); }
    .veh-cell.has-veh { border-style: solid; color: var(--tsh-text, #223); }
    .veh-cell.has-veh.four { border-color: #4a90e2; background: rgba(74,144,226,.10); }
    .veh-cell.has-veh.two  { border-color: #6ab04c; background: rgba(106,176,76,.10); }
    .veh-cell.has-veh.both { border-color: var(--tsh-accent, #b48a3c); background: var(--tsh-accent-soft, rgba(180,138,60,.14)); }
    .veh-cell[aria-pressed="true"] {
      outline: 2px solid var(--tsh-accent, #b48a3c); outline-offset: 2px;
      transform: translateY(-1px);
    }
    .veh-cell-flat { font-weight: 700; letter-spacing: .03em; }
    .veh-cell-badges { display: flex; gap: .4rem; font-size: .95em; line-height: 1; }
    .veh-cell-b2w, .veh-cell-b4w { display: inline-flex; align-items: center; gap: .1em; }
    .veh-tower-legend {
      display: flex; gap: .8rem; flex-wrap: wrap; font-size: .8rem;
      color: var(--tsh-muted, #667); margin: .5rem 0 0;
    }
    .veh-tower-legend span { display: inline-flex; align-items: center; gap: .3rem; }
    .veh-legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1.5px solid; display: inline-block; }
    .veh-legend-swatch.four { border-color: #4a90e2; background: rgba(74,144,226,.15); }
    .veh-legend-swatch.two  { border-color: #6ab04c; background: rgba(106,176,76,.15); }
    .veh-legend-swatch.both { border-color: var(--tsh-accent, #b48a3c); background: var(--tsh-accent-soft, rgba(180,138,60,.20)); }
    .veh-legend-swatch.empty { border-style: dashed; }

    /* Per-tower "add flat outside the current grid" fallback. */
    .veh-tower-tools { display: flex; gap: .4rem; margin-top: .6rem; align-items: center; flex-wrap: wrap; }
    .veh-tower-tools input { max-width: 8rem; }

    /* Flat detail panel — appears below the grids when a cell is picked. */
    .veh-flat-detail { margin-top: 1rem; padding: 1rem 1.1rem; border-radius: 12px;
      border: 1px solid var(--tsh-accent, #b48a3c);
      background: var(--tsh-surface-2, #f6f7fb);
    }
    .veh-flat-detail[hidden] { display: none; }
    .veh-flat-detail-head {
      display: flex; align-items: center; justify-content: space-between; gap: .6rem; flex-wrap: wrap;
      margin-bottom: .8rem;
    }
    .veh-flat-detail-head h3 { margin: 0; font-size: 1.15rem; letter-spacing: .03em; }
    .veh-flat-empty { color: var(--tsh-muted, #667); font-style: italic; padding: .3rem 0; }

    @media (max-width: 800px) {
      .veh-tower-grid { grid-template-columns: 2.2rem repeat(var(--units, 4), minmax(3.4rem, 1fr)); gap: .3rem; }
      .veh-cell { min-height: 3rem; font-size: .72rem; padding: .25rem .1rem; }
      .veh-cell-badges { font-size: .82em; gap: .25rem; }
    }
  </style>
</head>
<body class="tsh-page">
  <div data-include="header"></div>
  <div data-include="toast"></div>
  <div data-include="modal"></div>

  <main class="tsh-main tsh-main-wide">
    <section class="tsh-card veh-search-card">
      <header class="tsh-card-head">
        <h1><i class="fas fa-car-side gold-accent"></i> Vehicle Registry</h1>
        <p class="tsh-sub" id="vehRoleHint">Type a vehicle number to see which flat it belongs to.</p>
      </header>

      <div class="veh-search-row">
        <input
          type="search"
          id="vehSearch"
          placeholder="Enter vehicle number, e.g. MH11JJ0234"
          autocomplete="off"
          spellcheck="false"
          inputmode="latin"
          aria-label="Search vehicle number"
        />
        <button type="button" class="tsh-btn tsh-btn-ghost" id="vehSearchClear" title="Clear">
          <i class="fas fa-xmark"></i>
        </button>
      </div>

      <div class="veh-result" id="vehResult" hidden aria-live="polite"></div>
    </section>

    <!-- Manage pane — only visible to callers on the editor allowlist
         (default: MANAGER / COMMITTEE / TREASURER / SECRETARY / CHAIRMAN / ADMIN).
         The server also enforces the allowlist on every PUT/DELETE.

         Layout: tower-grouped seat-map style grids. Rows = floors (top-down
         like a building elevation), columns = flat units on each floor.
         Click a cell to select the flat; the detail panel below opens with
         that flat's vehicles + inline add/edit/delete. -->
    <section class="tsh-card veh-manage" id="vehManage" hidden>
      <header class="tsh-card-head">
        <h2><i class="fas fa-pen-to-square gold-accent"></i> Manage vehicles
          <span class="veh-count" id="vehTotalCount"></span>
        </h2>
        <p class="tsh-sub">Pick a flat below (like choosing a seat), then add or edit its vehicles. Vehicle numbers must be unique across the whole society.</p>
        <div class="veh-tower-legend" aria-label="Cell colour key">
          <span><span class="veh-legend-swatch empty"></span> Empty</span>
          <span><span class="veh-legend-swatch four"></span> 4-wheeler</span>
          <span><span class="veh-legend-swatch two"></span> 2-wheeler</span>
          <span><span class="veh-legend-swatch both"></span> Both</span>
        </div>
      </header>

      <div id="vehTowers" aria-label="Tower grids"></div>

      <!-- Flat detail panel — appears when a cell is picked. -->
      <div id="vehFlatDetail" class="veh-flat-detail" hidden aria-live="polite"></div>
    </section>
  </main>

  <div data-include="footer"></div>

  <script src="./assets/js/config.js?v=11"></script>
  <script src="./assets/js/partials.js?v=22"></script>
  <script src="./assets/js/api.js?v=12"></script>
  <script src="./assets/js/auth.js?v=11"></script>
  <script src="./assets/js/flags.js?v=14"></script>
  <script src="./assets/js/collapse-registry.js?v=1"></script>
  <script src="./assets/js/ui.js?v=53"></script>
  <script src="./assets/js/notify.js?v=1"></script>
  <script src="./assets/js/visitors.js?v=2"></script>
  <script>
  (async () => {
    await Partials.mount();
    await Auth.init({ clientId: window.TSH_GOOGLE_CLIENT_ID });
    UI.bindHeader();

    // Page-level guards: feature flag + sign-in. The server also enforces
    // both on every /vehicles call, but rendering the gate client-side is
    // faster than round-tripping only to be redirected.
    //
    // IMPORTANT: Flags.ensureFeature() reads cfg synchronously and returns
    // false-and-renders-the-gate if the config hasn't loaded yet. We MUST
    // await Flags.ready() first, otherwise the disabled-gate is shown even
    // when the flag is actually ON in Settings.
    try {
      await Flags.ready();
      Flags.ensureFeature('FEATURE_TSH_VEHICLES', 'Vehicle registry');
    } catch (_e) { return; }
    let who;
    try { who = await Flags.ensureAuthorized('RESIDENT'); }
    catch (_e) { return; }

    // -----------------------------------------------------------------
    // State + in-memory search index.
    // vehicles is the raw list from the server; index maps
    // normalisedRegNo -> vehicle for O(1) search. Rebuilt after every
    // Add/Edit/Delete so the search box always reflects live state.
    // -----------------------------------------------------------------
    let vehicles = [];
    let canWrite = false;
    let editorRoles = [];
    let index = new Map();

    const normReg = (raw) => String(raw || '').toUpperCase().replace(/[^A-Z0-9]/g, '');

    function rebuildIndex() {
      index = new Map();
      for (const v of vehicles) index.set(v.regNo, v);
    }

    async function load() {
      const data = await Api.get('/vehicles');
      vehicles = Array.isArray(data.vehicles) ? data.vehicles : [];
      canWrite = !!data.canWrite;
      editorRoles = Array.isArray(data.editorRoles) ? data.editorRoles : [];
      rebuildIndex();
      renderManage();
      // Keep any live search in sync.
      const q = document.getElementById('vehSearch').value;
      if (q) doSearch(q);
    }

    // -----------------------------------------------------------------
    // Search (primary UX). O(1) index lookup after a trivial normalise.
    // Blocks < 3 chars from surfacing partial matches that would spam
    // the result card while the user is still typing.
    // -----------------------------------------------------------------
    const resultEl = document.getElementById('vehResult');
    const searchEl = document.getElementById('vehSearch');
    const clearBtn = document.getElementById('vehSearchClear');

    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, (c) => (
        { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', '\'': '&#39;' }[c]
      ));
    }

    function renderResult(v, query) {
      if (v) {
        resultEl.innerHTML =
          '<div class="veh-result-flat"><i class="fas fa-house-chimney" aria-hidden="true"></i> Flat ' + esc(v.flat) + '</div>' +
          '<div class="veh-result-meta">' +
          '<strong>' + esc(v.regNoDisplay || v.regNo) + '</strong>' +
          ' · <span class="veh-badge">' + esc(v.type) + '</span>' +
          (v.sticker ? ' · Sticker <strong>' + esc(v.sticker) + '</strong>' : '') +
          (v.comments ? '<br><em>' + esc(v.comments) + '</em>' : '') +
          '</div>';
        resultEl.hidden = false;
      } else {
        resultEl.innerHTML = '<div class="veh-nomatch">' +
          '<i class="fas fa-circle-question" aria-hidden="true"></i> ' +
          'No vehicle found for "' + esc(query) + '".' +
          '</div>' +
          '<div class="veh-result-meta">Ask a manager to add it, or double-check the number.</div>';
        resultEl.hidden = false;
      }
    }

    function doSearch(raw) {
      const q = normReg(raw);
      if (!q) { resultEl.hidden = true; return; }
      if (q.length < 3) { resultEl.hidden = true; return; }
      const v = index.get(q);
      renderResult(v || null, raw);
    }

    let searchTimer;
    searchEl.addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => doSearch(searchEl.value), 100);
    });
    searchEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); doSearch(searchEl.value); }
    });
    clearBtn.addEventListener('click', () => {
      searchEl.value = '';
      resultEl.hidden = true;
      searchEl.focus();
    });

    // -----------------------------------------------------------------
    // Manage pane (tower-grouped seat-map). Gated by canWrite so the
    // markup is entirely hidden for callers who cannot mutate. Server
    // enforces the same allowlist on every PUT/DELETE anyway.
    // -----------------------------------------------------------------
    const manageEl = document.getElementById('vehManage');
    const towersEl = document.getElementById('vehTowers');
    const detailEl = document.getElementById('vehFlatDetail');
    const totalEl = document.getElementById('vehTotalCount');
    const roleHintEl = document.getElementById('vehRoleHint');

    // Minimum grid dimensions per tower. Real dims grow to fit observed
    // vehicles automatically — e.g. adding a flat B1204 grows Tower B to
    // 12 floors × ≥4 units.
    const MIN_FLOORS = 10;
    const MIN_UNITS  = 4;

    // Selected flat for the detail panel. null = no selection (panel hidden).
    let selectedFlat = null;

    function updateRoleHint() {
      if (canWrite) {
        roleHintEl.textContent =
          'Signed in as ' + (who.email || '') + ' (' + who.primary + ') · ' +
          'You may add, edit, and delete entries. Pick a flat to manage its vehicles.';
      } else {
        roleHintEl.textContent =
          'Signed in as ' + (who.email || '') + ' (' + who.primary + ') · ' +
          'Search-only access. Editing is restricted to: ' + editorRoles.join(', ') + '.';
      }
    }

    // -----------------------------------------------------------------
    // Flat parsing. Convention:
    //   Flat = <tower letter><digits>
    //   digits ≤ 2 chars → floor 0 (ground), unit = digits
    //   digits ≥ 3 chars → last 2 = unit, remaining prefix = floor
    // Examples: A201 → A, floor 2, unit 01
    //           A1004 → A, floor 10, unit 04
    //           C12  → C, floor 0 (ground), unit 12
    // -----------------------------------------------------------------
    function parseFlat(flat) {
      const m = /^([A-Z])([0-9]+)$/.exec(String(flat || '').toUpperCase());
      if (!m) return null;
      const tower = m[1];
      const digits = m[2];
      if (digits.length <= 2) {
        return { tower, floor: 0, unit: parseInt(digits, 10) || 0, unitStr: digits.padStart(2, '0') };
      }
      const unitStr = digits.slice(-2);
      const floorStr = digits.slice(0, -2);
      return { tower, floor: parseInt(floorStr, 10), unit: parseInt(unitStr, 10), unitStr };
    }

    function flatFromParts(tower, floor, unit) {
      const u = String(unit).padStart(2, '0');
      if (floor === 0) return tower + u;
      return tower + String(floor) + u;
    }

    // Build per-tower schematics: dims + vehicles by flat.
    function buildTowerSchematics() {
      const cfgTowers = (Flags.raw && Flags.raw.lists && Array.isArray(Flags.raw.lists.towers))
        ? Flags.raw.lists.towers : ['A', 'B', 'C'];
      const spec = new Map();
      const seed = (t) => {
        if (!spec.has(t)) spec.set(t, {
          minFloor: 1, maxFloor: MIN_FLOORS, maxUnit: MIN_UNITS,
          byFlat: new Map(), totalVehicles: 0,
        });
        return spec.get(t);
      };
      // Seed known towers so empty grids still show.
      for (const t of cfgTowers) {
        const letter = String(t || '').trim().charAt(0).toUpperCase();
        if (/^[A-Z]$/.test(letter)) seed(letter);
      }
      // Grow dims from observed vehicles.
      for (const v of vehicles) {
        const p = parseFlat(v.flat);
        if (!p) continue;
        const s = seed(p.tower);
        if (p.floor > s.maxFloor) s.maxFloor = p.floor;
        if (p.floor === 0) s.minFloor = 0;
        if (p.unit > s.maxUnit) s.maxUnit = p.unit;
        if (!s.byFlat.has(v.flat)) s.byFlat.set(v.flat, []);
        s.byFlat.get(v.flat).push(v);
        s.totalVehicles += 1;
      }
      return new Map([...spec.entries()].sort((a, b) => a[0].localeCompare(b[0])));
    }

    function cellBadges(rows) {
      const n2w = rows.filter((r) => r.type === '2W').length;
      const n4w = rows.filter((r) => r.type === '4W').length;
      let s = '';
      if (n4w) s += '<span class="veh-cell-b4w" title="' + n4w + ' four-wheeler(s)"><i class="fas fa-car"></i>' + n4w + '</span>';
      if (n2w) s += '<span class="veh-cell-b2w" title="' + n2w + ' two-wheeler(s)"><i class="fas fa-motorcycle"></i>' + n2w + '</span>';
      return s ? '<span class="veh-cell-badges">' + s + '</span>' : '';
    }

    function cellClass(rows) {
      if (rows.length === 0) return 'veh-cell';
      const has2 = rows.some((r) => r.type === '2W');
      const has4 = rows.some((r) => r.type === '4W');
      const kind = (has2 && has4) ? 'both' : (has4 ? 'four' : 'two');
      return 'veh-cell has-veh ' + kind;
    }

    function renderTowerGrid(tower, s) {
      const floors = [];
      for (let f = s.maxFloor; f >= s.minFloor; f--) floors.push(f);
      let cells = '';
      for (const f of floors) {
        cells += '<div class="veh-floor-label">' + (f === 0 ? 'GF' : f) + '</div>';
        for (let u = 1; u <= s.maxUnit; u++) {
          const flat = flatFromParts(tower, f, u);
          const rows = s.byFlat.get(flat) || [];
          const cls = cellClass(rows);
          const pressed = (flat === selectedFlat) ? 'true' : 'false';
          cells += '<button type="button" class="' + cls + '" data-flat="' + esc(flat) + '"' +
                   ' aria-pressed="' + pressed + '" title="Flat ' + esc(flat) + ' — ' + rows.length + ' vehicle(s)">' +
                   '<span class="veh-cell-flat">' + esc(flat) + '</span>' +
                   cellBadges(rows) +
                   '</button>';
        }
      }
      const label = 'Tower ' + esc(tower);
      const meta = s.totalVehicles + ' vehicle' + (s.totalVehicles === 1 ? '' : 's') +
                   ' · ' + s.byFlat.size + ' flat' + (s.byFlat.size === 1 ? '' : 's');
      return '<details class="veh-tower" data-tower="' + esc(tower) + '" open>' +
        '<summary>' + label + ' <span class="veh-tower-count">(' + meta + ')</span></summary>' +
        '<div class="veh-tower-grid" style="--units:' + s.maxUnit + '">' + cells + '</div>' +
        '<div class="veh-tower-tools">' +
          '<span style="color:var(--tsh-muted,#667);font-size:.85em;">Need a flat outside this grid?</span>' +
          '<input type="text" class="veh-tower-add-flat" placeholder="' + esc(tower) + '1401" maxlength="8" aria-label="Custom flat number" />' +
          '<button type="button" class="tsh-btn tsh-btn-ghost tsh-btn-sm" data-tower-add="' + esc(tower) + '"><i class="fas fa-plus"></i> Pick</button>' +
        '</div>' +
        '</details>';
    }

    function renderTowerGrids() {
      const specs = buildTowerSchematics();
      let html = '';
      for (const [tower, s] of specs) html += renderTowerGrid(tower, s);
      towersEl.innerHTML = html;
    }

    // -----------------------------------------------------------------
    // Flat detail panel. Opens below the tower grids when a cell is
    // clicked. Contains: header (with Close), list of vehicles for that
    // flat, and an add form pre-filled with the selected flat.
    // -----------------------------------------------------------------
    function renderRowRead(v) {
      const emailsTxt = Array.isArray(v.emails) && v.emails.length ? v.emails.join(', ') : '';
      return '<div class="veh-row" data-id="' + esc(v.id) + '">' +
        '<div><div class="veh-reg">' + esc(v.regNoDisplay || v.regNo) + '</div>' +
        (emailsTxt ? '<div class="veh-emails">' + esc(emailsTxt) + '</div>' : '') +
        '</div>' +
        '<div><span class="veh-badge">' + esc(v.type) + '</span></div>' +
        '<div>' + (v.sticker ? 'Sticker ' + esc(v.sticker) : '<span style="color:var(--tsh-muted,#667)">—</span>') + '</div>' +
        '<div>' + (v.comments ? esc(v.comments) : '<span style="color:var(--tsh-muted,#667)">—</span>') + '</div>' +
        '<div class="veh-actions">' +
        '<button type="button" class="tsh-btn tsh-btn-ghost tsh-btn-icon" data-edit title="Edit"><i class="fas fa-pen"></i></button>' +
        '<button type="button" class="tsh-btn tsh-btn-ghost tsh-btn-icon" data-del title="Delete"><i class="fas fa-trash"></i></button>' +
        '</div>' +
        '</div>';
    }

    function renderRowEdit(v) {
      const emailsTxt = Array.isArray(v.emails) ? v.emails.join(', ') : '';
      return '<div class="veh-row" data-id="' + esc(v.id) + '" data-editing="1">' +
        '<div>' +
        '<input class="veh-e-reg" value="' + esc(v.regNoDisplay || v.regNo) + '" maxlength="20" style="text-transform:uppercase" />' +
        '<input class="veh-e-emails" style="margin-top:.3rem" placeholder="Emails (comma-separated)" value="' + esc(emailsTxt) + '" maxlength="600" />' +
        '</div>' +
        '<div><select class="veh-e-type">' +
          '<option value="4W"' + (v.type === '4W' ? ' selected' : '') + '>4W</option>' +
          '<option value="2W"' + (v.type === '2W' ? ' selected' : '') + '>2W</option>' +
          '</select></div>' +
        '<div><input class="veh-e-sticker" value="' + esc(v.sticker || '') + '" placeholder="Sticker" maxlength="20" style="text-transform:uppercase" /></div>' +
        '<div><input class="veh-e-comments" value="' + esc(v.comments || '') + '" placeholder="Comments" maxlength="200" /></div>' +
        '<div class="veh-actions">' +
        '<button type="button" class="tsh-btn tsh-btn-primary tsh-btn-icon" data-save title="Save"><i class="fas fa-check"></i></button>' +
        '<button type="button" class="tsh-btn tsh-btn-ghost tsh-btn-icon" data-cancel title="Cancel"><i class="fas fa-xmark"></i></button>' +
        '</div>' +
        '</div>';
    }

    function renderFlatDetail() {
      if (!selectedFlat) { detailEl.hidden = true; detailEl.innerHTML = ''; return; }
      const rows = vehicles.filter((v) => v.flat === selectedFlat).sort((a, b) => a.regNo.localeCompare(b.regNo));
      const listHtml = rows.length
        ? rows.map(renderRowRead).join('')
        : '<p class="veh-flat-empty">No vehicles registered for this flat yet. Add the first one below.</p>';
      detailEl.innerHTML =
        '<div class="veh-flat-detail-head">' +
          '<h3><i class="fas fa-house-chimney gold-accent"></i> Flat ' + esc(selectedFlat) +
            ' <span class="veh-count">(' + rows.length + ')</span></h3>' +
          '<button type="button" class="tsh-btn tsh-btn-ghost tsh-btn-sm" id="vehDetailClose">' +
          '<i class="fas fa-xmark"></i> Close</button>' +
        '</div>' +
        '<div class="veh-list" id="vehDetailList">' + listHtml + '</div>' +
        '<form id="vehDetailAdd" class="veh-add-grid" style="margin-top:1rem" autocomplete="off">' +
          '<div class="tsh-field">' +
            '<label for="vehDetailReg">Vehicle number *</label>' +
            '<input id="vehDetailReg" required placeholder="MH11JJ0234" maxlength="20" style="text-transform:uppercase;letter-spacing:.04em" />' +
          '</div>' +
          '<div class="tsh-field">' +
            '<label for="vehDetailType">Type *</label>' +
            '<select id="vehDetailType" required>' +
              '<option value="4W">4W</option><option value="2W">2W</option>' +
            '</select>' +
          '</div>' +
          '<div class="tsh-field">' +
            '<label for="vehDetailSticker">Sticker</label>' +
            '<input id="vehDetailSticker" placeholder="P-104" maxlength="20" style="text-transform:uppercase" />' +
          '</div>' +
          '<div class="tsh-field">' +
            '<label for="vehDetailComments">Comments</label>' +
            '<input id="vehDetailComments" placeholder="White Honda City" maxlength="200" />' +
          '</div>' +
          '<div class="tsh-field" style="grid-column: 1 / -1">' +
            '<label for="vehDetailEmails">Owner emails (optional, comma-separated, up to 5)</label>' +
            '<input id="vehDetailEmails" placeholder="owner1@example.com, owner2@example.com" maxlength="600" />' +
          '</div>' +
          '<button type="submit" class="tsh-btn tsh-btn-primary" id="vehDetailAddBtn" style="grid-column: 1 / -1;justify-self:start">' +
            '<i class="fas fa-plus"></i> Add to Flat ' + esc(selectedFlat) +
          '</button>' +
        '</form>';
      detailEl.hidden = false;
      // Focus regNo when the panel opens so the manager can start typing immediately.
      const regInput = document.getElementById('vehDetailReg');
      if (regInput) regInput.focus();
    }

    // Set the current flat, sync the aria-pressed state on the grid, and
    // render the detail panel.
    function selectFlat(flat, opts) {
      selectedFlat = flat || null;
      // Update aria-pressed on all cells in the current tower group.
      for (const btn of towersEl.querySelectorAll('.veh-cell')) {
        btn.setAttribute('aria-pressed', btn.getAttribute('data-flat') === selectedFlat ? 'true' : 'false');
      }
      renderFlatDetail();
      if (selectedFlat && !(opts && opts.noScroll)) {
        // Scroll the detail panel into view — nice on long tower lists.
        detailEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }

    function renderManage() {
      updateRoleHint();
      manageEl.hidden = !canWrite;
      totalEl.textContent = '(' + vehicles.length + ')';
      if (!canWrite) { detailEl.hidden = true; towersEl.innerHTML = ''; return; }
      renderTowerGrids();
      // Re-render the detail panel (list may have changed for the current flat).
      renderFlatDetail();
    }

    // -----------------------------------------------------------------
    // CRUD.
    // -----------------------------------------------------------------
    async function saveAll(next) {
      await Api.put('/vehicles', { vehicles: next });
      await load();
    }

    function parseEmails(raw) {
      return String(raw || '')
        .split(/[,\s]+/)
        .map((s) => s.trim().toLowerCase())
        .filter(Boolean);
    }

    // -----------------------------------------------------------------
    // Delegated events.
    // -----------------------------------------------------------------
    // Tower grid: cell click → select flat; "Pick" button → jump to a
    // custom flat outside the grid.
    towersEl.addEventListener('click', (e) => {
      const cell = e.target.closest('.veh-cell');
      if (cell) {
        selectFlat(cell.getAttribute('data-flat'));
        return;
      }
      const addBtn = e.target.closest('[data-tower-add]');
      if (addBtn) {
        const tower = addBtn.getAttribute('data-tower-add');
        const input = addBtn.parentElement.querySelector('.veh-tower-add-flat');
        const raw = (input && input.value || '').trim().toUpperCase();
        if (!raw) { UI.toast('Enter a flat like ' + tower + '1401.', { kind: 'danger' }); return; }
        if (!/^[A-Z][0-9]{1,4}$/.test(raw)) {
          UI.toast('Flat must be a tower letter followed by 1–4 digits.', { kind: 'danger' });
          return;
        }
        if (raw.charAt(0) !== tower) {
          UI.toast('Flat "' + raw + '" is not in Tower ' + tower + '.', { kind: 'danger' });
          return;
        }
        input.value = '';
        selectFlat(raw);
      }
    });

    // Auto-uppercase the "custom flat" input as the user types.
    towersEl.addEventListener('input', (e) => {
      if (e.target.classList.contains('veh-tower-add-flat')) {
        const p = e.target.selectionStart;
        e.target.value = e.target.value.toUpperCase();
        try { e.target.setSelectionRange(p, p); } catch (_x) { /* ignore */ }
      }
    });

    // Detail panel: submit (add), delegated read-row actions.
    detailEl.addEventListener('click', async (e) => {
      const closeBtn = e.target.closest('#vehDetailClose');
      if (closeBtn) { selectFlat(null); return; }
      const btn = e.target.closest('button');
      if (!btn) return;
      const row = btn.closest('.veh-row');
      if (!row) return;
      const id = row.getAttribute('data-id');
      const v = vehicles.find((x) => x.id === id);
      if (!v) return;

      if (btn.hasAttribute('data-edit')) {
        row.outerHTML = renderRowEdit(v);
        return;
      }
      if (btn.hasAttribute('data-cancel')) {
        row.outerHTML = renderRowRead(v);
        return;
      }
      if (btn.hasAttribute('data-save')) {
        const r = row;
        const newReg = r.querySelector('.veh-e-reg').value.trim().toUpperCase();
        const newType = r.querySelector('.veh-e-type').value;
        const newSticker = r.querySelector('.veh-e-sticker').value.trim().toUpperCase();
        const newComments = r.querySelector('.veh-e-comments').value.trim();
        const newEmails = parseEmails(r.querySelector('.veh-e-emails').value);
        const normalised = normReg(newReg);
        if (!normalised) { UI.toast('Vehicle number is required.', { kind: 'danger' }); return; }
        const clash = vehicles.find((x) => x.id !== id && x.regNo === normalised);
        if (clash) {
          UI.toast('Another entry (flat ' + clash.flat + ') already uses that number.', { kind: 'danger' });
          return;
        }
        await UI.busyButton(btn, async () => {
          const next = vehicles.map((x) => x.id === id ? {
            ...x,
            regNo: newReg,
            type: newType,
            sticker: newSticker,
            comments: newComments,
            emails: newEmails,
          } : x);
          try {
            await saveAll(next);
            UI.toast('Vehicle updated.', { kind: 'success' });
          } catch (err) {
            UI.toast(err.message || 'Save failed.', { kind: 'danger' });
          }
        }, { label: 'Saving…' });
        return;
      }
      if (btn.hasAttribute('data-del')) {
        if (!confirm('Delete vehicle ' + (v.regNoDisplay || v.regNo) + ' from flat ' + v.flat + '?')) return;
        await UI.busyButton(btn, async () => {
          try {
            await Api.del('/vehicles/' + encodeURIComponent(id));
            await load();
            UI.toast('Vehicle removed.', { kind: 'success' });
          } catch (err) {
            UI.toast(err.message || 'Delete failed.', { kind: 'danger' });
          }
        }, { label: 'Deleting…' });
      }
    });

    // Detail panel: add form submit + case-insensitive typing.
    detailEl.addEventListener('input', (e) => {
      // Auto-uppercase regNo + sticker as the user types.
      if (e.target && (e.target.id === 'vehDetailReg' || e.target.id === 'vehDetailSticker' ||
                       e.target.classList.contains('veh-e-reg') ||
                       e.target.classList.contains('veh-e-sticker'))) {
        const p = e.target.selectionStart;
        e.target.value = e.target.value.toUpperCase();
        try { e.target.setSelectionRange(p, p); } catch (_x) { /* ignore */ }
      }
    });

    detailEl.addEventListener('submit', async (e) => {
      if (e.target && e.target.id === 'vehDetailAdd') {
        e.preventDefault();
        if (!selectedFlat) { UI.toast('Pick a flat first.', { kind: 'danger' }); return; }
        const regNo = document.getElementById('vehDetailReg').value.trim().toUpperCase();
        const type = document.getElementById('vehDetailType').value;
        const sticker = document.getElementById('vehDetailSticker').value.trim().toUpperCase();
        const comments = document.getElementById('vehDetailComments').value.trim();
        const emails = parseEmails(document.getElementById('vehDetailEmails').value);
        const normalised = normReg(regNo);
        if (!normalised) { UI.toast('Vehicle number is required.', { kind: 'danger' }); return; }
        if (index.has(normalised)) {
          const existing = index.get(normalised);
          UI.toast('That vehicle is already registered to flat ' + existing.flat + '.', { kind: 'danger' });
          return;
        }
        const btn = document.getElementById('vehDetailAddBtn');
        await UI.busyButton(btn, async () => {
          const next = vehicles.concat([{ flat: selectedFlat, regNo, type, sticker, comments, emails }]);
          try {
            await saveAll(next);
            UI.toast('Vehicle added to ' + selectedFlat + '.', { kind: 'success' });
            // Detail panel is re-rendered by load() → renderManage(); the
            // add-form fields are recreated fresh so nothing to reset here.
          } catch (err) {
            UI.toast(err.message || 'Add failed.', { kind: 'danger' });
          }
        }, { label: 'Adding…' });
      }
    });

    await load();
    searchEl.focus();
  })();
  </script>
</body>
</html>

<!-- TSH header partial. Loaded via partials.js#include('header').
     JS hooks: [data-tsh-user] / [data-tsh-signin] / [data-tsh-signout]
     wired by ui.bindHeader; [data-tsh-role-link] revealed by Flags.whoami. -->
<header class="tsh-header" role="banner">
  <div class="tsh-header-inner">
    <a class="tsh-brand" href="./index.html" aria-label="The Address — Society Help Desk home">
      <img src="./assets/images/TaLogo.png" alt="" width="203" height="204" data-tsh-logo />
      <span class="tsh-brand-text">
        <span class="tsh-brand-name">The Address</span>
        <span class="tsh-brand-tag">Society Help Desk</span>
      </span>
    </a>
    <nav id="tshPrimaryNav" class="tsh-nav" aria-label="Primary">
      <a href="./index.html" data-tsh-nav="home" title="Home" data-tsh-tip="Home"><i class="fas fa-house"></i>Home</a>
      <a href="./daily-report.html" data-tsh-nav="report" title="Report an issue" data-tsh-tip="Report"><i class="fas fa-pen-to-square"></i>Report</a>
      <a href="./public-board.html" data-tsh-nav="board" data-tsh-feature="FEATURE_DAILY_PUBLIC_BOARD" title="Public board" data-tsh-tip="Board"><i class="fas fa-list-check"></i>Board</a>
      <a href="./directory.html"   data-tsh-nav="directory" data-tsh-feature="FEATURE_DAILY_DIRECTORY" title="Society directory" data-tsh-tip="Directory"><i class="fas fa-address-book"></i>Directory</a>
      <a href="./public-board.html?my=1" data-tsh-myreports hidden title="My reports" data-tsh-tip="My reports"><i class="fas fa-bookmark"></i>My reports <span data-tsh-myreports-count></span></a>
      <a data-tsh-role-link="MANAGER" data-tsh-feature="FEATURE_DAILY_KPI_DASHBOARD" href="./manager-dashboard.html" hidden title="Manager KPI dashboard" data-tsh-tip="Dashboard"><i class="fas fa-chart-line"></i>Dashboard</a>
      <a data-tsh-role-link="MANAGER" data-tsh-feature="FEATURE_DAILY_MANAGER_DASHBOARD" href="./manage.html" hidden title="Manage issues" data-tsh-tip="Manage"><i class="fas fa-user-shield"></i>Manage</a>
      <a data-tsh-role-link="ADMIN" href="./settings.html"            hidden title="Site settings" data-tsh-tip="Settings"><i class="fas fa-sliders"></i>Settings</a>
    </nav>
    <div class="tsh-userbox" data-tsh-userbox>
      <span data-tsh-user class="tsh-user-anon" tabindex="0" aria-label="Account"><span class="tsh-user-text"> Not signed in</span></span>
      <button type="button" class="tsh-btn tsh-btn-ghost tsh-btn-icon tsh-btn-iconxs tsh-bell" data-tsh-notify-bell hidden aria-label="Notifications" title="Notifications" data-tsh-tip="Notifications"><i class="fas fa-bell" aria-hidden="true"></i><span class="tsh-bell-badge" data-tsh-notify-count hidden>0</span></button>
      <a class="tsh-btn tsh-btn-ghost tsh-btn-icon tsh-btn-iconxs" data-tsh-download-latest hidden target="_blank" rel="noopener" aria-label="Download latest TSH_Report.pdf" title="Download latest TSH_Report.pdf" data-tsh-tip="Download latest TSH_Report.pdf"><i class="fas fa-cloud-arrow-down" aria-hidden="true"></i><span class="tsh-btn-label">Latest</span></a>
      <button type="button" class="tsh-btn tsh-btn-ghost tsh-btn-icon tsh-btn-iconxs" data-tsh-export hidden aria-label="Export PDF report" title="Export PDF report" data-tsh-tip="Export PDF report"><i class="fas fa-file-pdf" aria-hidden="true"></i><span class="tsh-btn-label">Export</span></button>
      <button type="button" class="tsh-btn tsh-btn-primary" data-tsh-signin hidden aria-label="Sign in with Google" title="Sign in with Google" data-tsh-tip="Sign in"><i class="fas fa-right-to-bracket" aria-hidden="true"></i><span class="tsh-btn-label">Sign in</span></button>
      <button type="button" class="tsh-btn tsh-btn-ghost"   data-tsh-signout hidden aria-label="Sign out" title="Sign out" data-tsh-tip="Sign out"><i class="fas fa-right-from-bracket" aria-hidden="true"></i><span class="tsh-btn-label">Sign out</span></button>
    </div>
  </div>
</header>

<!-- Floating display controls (theme + font size). Draggable: grab the
     handle on the left to move; position is persisted per-device in
     localStorage (tsh_floatdock_pos). Double-click handle to reset. -->
<div class="tsh-floatdock" role="region" aria-label="Display controls" data-tsh-floatdock>
  <button type="button" class="tsh-floatdock-handle" data-tsh-floatdock-handle
          aria-label="Drag to move display controls" title="Drag to move · double-click to reset">
    <i class="fas fa-grip-vertical" aria-hidden="true"></i>
  </button>
  <div class="tsh-themeswitch" role="group" aria-label="Theme tone">
    <button type="button" class="tsh-themeswitch-dark"   data-tsh-theme="dark"   aria-pressed="true"  title="Dark tone"></button>
    <button type="button" class="tsh-themeswitch-light"  data-tsh-theme="light"  aria-pressed="false" title="Light tone"></button>
    <button type="button" class="tsh-themeswitch-medium" data-tsh-theme="medium" aria-pressed="false" title="Medium tone"></button>
  </div>
  <div class="tsh-fontsize" role="group" aria-label="Text size">
    <button type="button" class="tsh-fontsize-md" data-tsh-fontsize="md" aria-pressed="true"  title="Default text size">A</button>
    <button type="button" class="tsh-fontsize-lg" data-tsh-fontsize="lg" aria-pressed="false" title="Comfortable text size">A</button>
    <button type="button" class="tsh-fontsize-xl" data-tsh-fontsize="xl" aria-pressed="false" title="Spacious text size">A</button>
  </div>
</div>

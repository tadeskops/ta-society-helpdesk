<!-- TSH header partial. Loaded via partials.js#include('header').
     JS hooks: [data-tsh-user] / [data-tsh-signin] / [data-tsh-signout]
     wired by ui.bindHeader; [data-tsh-role-link] revealed by Flags.whoami. -->
<header class="tsh-header" role="banner">
  <div class="tsh-header-inner">
    <a class="tsh-brand" href="./index.html" aria-label="The Address — Society Helpdesk home">
      <img src="./assets/images/TaLogo.png" alt="" width="203" height="204" data-tsh-logo />
      <span class="tsh-brand-text">
        <span class="tsh-brand-name">TA Society Helpdesk</span>
        <span class="tsh-brand-tag">The Address &middot; Daily Track</span>
      </span>
    </a>
    <nav class="tsh-nav" aria-label="Primary">
      <a href="./daily-report.html"><i class="fas fa-pen-to-square"></i>Report</a>
      <a href="./public-board.html" data-tsh-feature="FEATURE_DAILY_PUBLIC_BOARD"><i class="fas fa-list-check"></i>Board</a>
      <a href="./public-board.html?my=1" data-tsh-myreports hidden><i class="fas fa-bookmark"></i>My reports <span data-tsh-myreports-count></span></a>
      <a data-tsh-role-link="MANAGER" data-tsh-feature="FEATURE_DAILY_MANAGER_DASHBOARD" href="./manage.html" hidden><i class="fas fa-user-shield"></i>Manage</a>
      <a data-tsh-role-link="DEVELOPER" href="./settings.html"            hidden><i class="fas fa-sliders"></i>Settings</a>
    </nav>
    <div class="tsh-userbox">
      <span data-tsh-user class="tsh-user-anon"><i class="fas fa-user"></i> Not signed in</span>
      <button type="button" class="tsh-btn tsh-btn-primary" data-tsh-signin hidden><i class="fas fa-right-to-bracket"></i>Sign in</button>
      <button type="button" class="tsh-btn tsh-btn-ghost"   data-tsh-signout hidden><i class="fas fa-right-from-bracket"></i>Sign out</button>
    </div>
  </div>
</header>

<!-- Floating display controls (theme + font size) — fixed bottom-right
     so they're always reachable without taking header space. -->
<div class="tsh-floatdock" role="region" aria-label="Display controls">
  <div class="tsh-themeswitch" role="group" aria-label="Theme tone">
    <button type="button" class="tsh-themeswitch-dark"   data-tsh-theme="dark"   aria-pressed="true"  title="Dark tone"></button>
    <button type="button" class="tsh-themeswitch-light"  data-tsh-theme="light"  aria-pressed="false" title="Light tone"></button>
    <button type="button" class="tsh-themeswitch-medium" data-tsh-theme="medium" aria-pressed="false" title="Medium tone"></button>
  </div>
  <div class="tsh-fontsize" role="group" aria-label="Text size">
    <button type="button" class="tsh-fontsize-md" data-tsh-fontsize="md" aria-pressed="true"  title="Default text size">A</button>
    <button type="button" class="tsh-fontsize-lg" data-tsh-fontsize="lg" aria-pressed="false" title="Comfortable text size">A</button>
    <button type="button" class="tsh-fontsize-xl" data-tsh-fontsize="xl" aria-pressed="false" title="Spacious text size">A</button>
  </div>
</div>

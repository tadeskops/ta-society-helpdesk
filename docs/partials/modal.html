<!-- Generic modal shell. ui.modal() fills .tsh-modal-title /
     .tsh-modal-body / .tsh-modal-actions and toggles [hidden]. -->
<div class="tsh-modal" data-tsh-modal hidden role="dialog" aria-modal="true" aria-labelledby="tsh-modal-title">
  <div class="tsh-modal-backdrop" data-tsh-modal-close></div>
  <div class="tsh-modal-panel">
    <button type="button" class="tsh-modal-close" data-tsh-modal-close aria-label="Close dialog">
      <i class="fas fa-times" aria-hidden="true"></i>
    </button>
    <h2 id="tsh-modal-title" class="tsh-modal-title"></h2>
    <div class="tsh-modal-body"></div>
    <div class="tsh-modal-actions"></div>
  </div>
</div>

<!-- TSH footer partial. -->
<footer class="tsh-footer" role="contentinfo">
  <a class="tsh-footer-social tsh-footer-ig"
     href="https://www.instagram.com/theaddress_society"
     rel="noopener"
     target="_blank"
     aria-label="Follow @theaddress_society on Instagram"
     title="Follow @theaddress_society on Instagram">
    <i class="fab fa-instagram" aria-hidden="true"></i>
    <span>@theaddress_society</span>
  </a>

  <!--
    Centre zone. Holds the "Report site bug" call-to-action plus the
    (usually-hidden) visitor counter. The report button is intentionally
    NOT a link to GitHub: reports are captured in a modal and dispatched
    via the user's mail client to the maintainer, so they never mix with
    resident helpdesk issues. See the inline script at the bottom of this
    partial for the wiring.
  -->
  <div class="tsh-footer-center">
    <button type="button"
            class="tsh-footer-report-btn"
            data-tsh-report-open
            aria-haspopup="dialog"
            aria-label="Report a bug or issue with this website"
            title="Report a bug or issue with this website (does not create a helpdesk ticket)">
      <i class="fas fa-bug" aria-hidden="true"></i>
      <span class="tsh-footer-report-btn-label">Report site bug</span>
    </button>
    <span class="tsh-visitors" data-tsh-visitors hidden>
      <i class="fas fa-eye" aria-hidden="true"></i>
      <span data-tsh-visitors-count>—</span> visitors
    </span>
  </div>

  <small class="tsh-footer-meta">
    <i class="fas fa-shield-halved" aria-hidden="true"></i>
    The Address · Society Help Desk ·
    <a href="https://github.com/tadeskops/ta-society-helpdesk" rel="noopener" target="_blank"><i class="fab fa-github"></i> source</a> ·
    <span data-tsh-build>v1</span>
  </small>

  <script>
    // "Report site bug" modal.
    //
    // Design notes:
    //  - Submits directly to the worker (POST /tool-issues) which files
    //    the report as a GitHub issue with a dedicated `tool-issue` label.
    //    Every resident-facing listing endpoint filters by the `daily`
    //    label, so tool reports are invisible to the helpdesk UI.
    //  - Requires a signed-in Google user (worker enforces this too).
    //    A signed-out click prompts sign-in via window.Auth.signIn().
    //  - Uses the shared UI.modal + UI.PhotoTray helpers so the form
    //    inherits client-side image resize + the same modal chrome.
    //  - Up to 3 screenshots, each ≤2 MB after resize, embedded in the
    //    issue body as raw.githubusercontent.com URLs.
    //  - All errors are surfaced via UI.toast; the footer must never
    //    throw and break the page.
    (function () {
      try {
        const btn = document.querySelector('[data-tsh-report-open]');
        if (!btn) return;

        btn.addEventListener('click', async () => {
          const UI = window.UI;
          const Api = window.Api;
          const Auth = window.Auth;

          if (!UI || !UI.modal || !Api || !Api.post) {
            // Should never happen — every page loads ui.js + api.js — but
            // if it does, at least tell the user rather than doing nothing.
            alert('The report tool is not available on this page. Please try again from another page or contact ta.deskops@gmail.com.');
            return;
          }

          // Require sign-in up front so the user isn't asked to type a
          // report and then rejected.
          let who = null;
          try {
            if (window.Flags && window.Flags.whoami) {
              who = await window.Flags.whoami();
            }
          } catch (_e) { /* fall through */ }
          if (!who || !who.email) {
            if (UI.toast) UI.toast('Please sign in with Google to report a site bug.', { kind: 'warn' });
            if (Auth && Auth.signIn) { try { Auth.signIn(); } catch (_e) { /* noop */ } }
            return;
          }

          // Build the form.
          const form = document.createElement('form');
          form.className = 'tsh-tool-issue-form';
          form.noValidate = true;
          form.innerHTML = ''
            + '<p class="tsh-hint" style="margin-top:0">'
            +   'Report a problem with the <strong>website itself</strong> — a layout bug, a broken button, wrong data, etc. '
            +   'This is filed as a GitHub issue for the maintainer and <strong>does not</strong> create a society helpdesk ticket.'
            + '</p>'
            + '<label class="tsh-field">'
            +   '<span class="tsh-label">What went wrong <span class="tsh-req">*</span></span>'
            +   '<textarea data-tool-desc rows="5" required minlength="10" maxlength="2000" '
            +             'placeholder="Describe the problem, what you expected, and any steps to reproduce."></textarea>'
            + '</label>'
            + '<label class="tsh-field">'
            +   '<span class="tsh-label">Screenshots (optional, up to 3)</span>'
            +   '<input type="file" data-tool-files accept="image/*" multiple />'
            +   '<span class="tsh-hint">Resized in your browser to keep uploads small.</span>'
            + '</label>'
            + '<div class="tsh-photo-tray" data-tool-tray hidden></div>';

          // Wire the photo tray (uses the same helper as daily-report).
          let tray = null;
          if (UI.PhotoTray && UI.PhotoTray.create) {
            try {
              const input  = form.querySelector('[data-tool-files]');
              const trayEl = form.querySelector('[data-tool-tray]');
              tray = UI.PhotoTray.create({ input, tray: trayEl, max: 3, maxDim: 1400, quality: 0.8 });
              input.addEventListener('change', (e) => { tray.add(e.target.files); });
            } catch (_e) { /* photo tray optional */ }
          }

          const choice = await UI.modal({
            title: 'Report site bug',
            body: form,
            actions: [
              { label: 'Cancel', value: null },
              { label: 'Send report', value: 'send', primary: true },
            ],
          });
          if (choice !== 'send') return;

          const descEl = form.querySelector('[data-tool-desc]');
          const desc   = (descEl && descEl.value || '').trim();
          if (desc.length < 10) {
            if (UI.toast) UI.toast('Please describe the problem in at least 10 characters.', { kind: 'warn' });
            return;
          }
          const photos = (tray && tray.photos) ? tray.photos() : [];

          const payload = {
            description: desc,
            page: location.href,
            pageTitle: (document.title || location.pathname || '').trim().slice(0, 200),
            userAgent: (navigator.userAgent || 'unknown').slice(0, 500),
            photos: photos.map((p, i) => ({
              dataUrl: p.dataUrl,
              name: p.name || 'screenshot-' + (i + 1) + '.jpg',
            })),
          };

          let result;
          try {
            result = await Api.post('/tool-issues', payload);
          } catch (err) {
            const status = err && err.status;
            const msg = (err && (err.message || err.error)) || 'Something went wrong sending the report.';
            if (status === 401 && Auth && Auth.signIn) {
              if (UI.toast) UI.toast('Please sign in to send the report.', { kind: 'warn' });
              try { Auth.signIn(); } catch (_e) { /* noop */ }
              return;
            }
            if (UI.toast) UI.toast(msg, { kind: 'error' });
            return;
          }

          const num = result && (result.number || (result.data && result.data.number));
          const url = result && (result.url    || (result.data && result.data.url));
          if (UI.toast) {
            UI.toast('Report filed as #' + num + '. Thanks!', { kind: 'success' });
          }

          // Follow-up modal with a link to the issue.
          try {
            const body = document.createElement('div');
            body.innerHTML = ''
              + '<p style="margin-top:0">Thanks — your report was filed as '
              +   '<strong>#' + num + '</strong>.</p>'
              + '<p style="margin-bottom:0">'
              +   '<a href="' + url + '" rel="noopener" target="_blank">'
              +     'View on GitHub <i class="fas fa-arrow-up-right-from-square" aria-hidden="true"></i>'
              +   '</a>'
              + '</p>';
            await UI.modal({
              title: 'Report sent',
              body,
              actions: [{ label: 'Close', value: null, primary: true }],
            });
          } catch (_e) { /* confirmation modal is best-effort */ }
        });
      } catch (_e) { /* never break the footer */ }
    })();
  </script>
</footer>
